<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Glitch Quantum — split v3 (part 1)</title>
<style>
  /* Core styles: header, layout, sidebar, canvas, popups */
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  :root{
    --bg:#020418; --panel:#03061a; --border:#182050;
    --cyan:#00f5ff; --mag:#ff00aa; --gold:#ffd700; --tx:#cfe;
    --dim:#6f7aa0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--tx);overflow:hidden}
  #root{display:flex;flex-direction:column;height:100vh}
  #hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border);background:#02041a}
  #logo{font-family:Orbitron,sans-serif;color:var(--cyan);letter-spacing:2px}
  #hdr .controls{display:flex;gap:10px;align-items:center}
  .btn{font-family:'Share Tech Mono',monospace;padding:6px 10px;border-radius:6px;border:none;cursor:pointer}
  .btn.cyan{background:var(--cyan);color:#021}
  .btn.mag{background:var(--mag);color:#fff}
  #main{display:flex;flex:1;min-height:0}
  #czone{flex:1;position:relative;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  #sidebar{width:320px;border-left:1px solid var(--border);background:#050616;padding:10px;overflow:auto}
  .slabel{color:var(--dim);font-size:12px;margin:8px 0 6px}
  #clog{position:absolute;top:8px;left:8px;z-index:60;pointer-events:none}
  .clog-line{font-size:11px;margin-bottom:6px}
  /* Loot popup */
  #loot-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:140;display:none}
  #loot-pop{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.98);z-index:150;display:none;
            background:#06101a;border:2px solid var(--mag);padding:16px;border-radius:10px;min-width:260px;text-align:center}
  #loot-pop .lp-ic{font-size:38px}
  #loot-pop .lp-nm{font-family:Orbitron, sans-serif;margin-top:6px;color:var(--tx)}
  #loot-pop .lp-rar{margin-top:6px}
  /* modal overlay (boss) */
  .modal-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:200}
  .modal-box{background:#021028;padding:16px;border-radius:8px;border:1px solid #223;color:var(--tx);min-width:320px}
  /* small UI */
  #upg-bar{position:absolute;bottom:86px;left:50%;transform:translateX(-50%);display:none;background:#07101d;border:1px solid var(--cyan);padding:6px 12px;border-radius:20px;z-index:80}
  #wave-badge{position:absolute;top:8px;right:8px;background:#07101d;border:1px solid var(--mag);padding:6px 10px;border-radius:6px;z-index:80;color:var(--mag)}
  /* sidebar items */
  .equip-slot{display:flex;align-items:center;justify-content:space-between;padding:8px;background:#071028;border-radius:6px;border:1px solid var(--border);margin-bottom:8px}
  .inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .inv-slot{background:#051025;border-radius:6px;height:58px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);font-size:18px;cursor:pointer}
  .inv-slot.empty{opacity:0.25}
  /* responsive */
  @media (max-width:900px){#sidebar{width:300px}}
</style>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div id="logo">GLITCH <span style="color:var(--mag)">QUANTUM</span></div>
    <div class="controls">
      <button class="btn cyan" id="open-1">1 AÇ</button>
      <button class="btn cyan" id="open-10">10 AÇ</button>
      <div style="margin-left:8px;color:var(--dim)">Box: <span id="box-count">0</span></div>
      <label style="margin-left:12px;color:var(--dim)"><input id="auto-open" type="checkbox" /> Auto Open</label>
      <label style="color:var(--dim)"><input id="auto-equip" type="checkbox" /> AutoEquip+</label>
      <label style="color:var(--dim)"><input id="auto-sell" type="checkbox" /> AutoSell</label>
    </div>
  </div>

  <div id="main">
    <div id="czone">
      <canvas id="gc"></canvas>
      <div id="clog"></div>
      <div id="wave-badge">WAVE <span id="wb-wave">1</span>-<span id="wb-sub">1</span></div>
      <div id="upg-bar">⚙️ <span id="ub-txt">Gemi Yükseltiliyor</span></div>

      <div id="loot-overlay"></div>
      <div id="loot-pop">
        <div class="lp-ic" id="lp-ic">🔫</div>
        <div class="lp-rar" id="lp-rar">BRONZ</div>
        <div class="lp-nm" id="lp-nm">BRONZ Gövde</div>
        <div id="lp-st" style="margin-top:6px;color:var(--tx)">+15 HP</div>
        <div style="display:flex;gap:8px;margin-top:12px;justify-content:center">
          <button class="btn cyan" id="lp-eq">KUŞAN</button>
          <button class="btn" id="lp-bag">ÇANTA</button>
          <button class="btn mag" id="lp-sell">SAT</button>
        </div>
      </div>

      <div id="boss-modal" class="modal-overlay">
        <div class="modal-box">
          <h3 id="boss-title">BOSS</h3>
          <div style="height:12px;background:#081018;border-radius:6px;margin:8px 0">
            <div id="boss-hp-bar" style="height:100%;width:100%;background:var(--red);border-radius:6px"></div>
          </div>
          <div id="boss-log" style="height:120px;overflow:auto;background:#02031a;padding:8px;border-radius:6px;margin-bottom:8px"></div>
          <div style="display:flex;gap:8px;justify-content:center">
            <button class="btn cyan" id="boss-attack">⚔️ SALDIR</button>
            <button class="btn" id="boss-retreat">🚪 GERİ ÇEKİL</button>
          </div>
        </div>
      </div>

    </div><!-- /czone -->

    <div id="sidebar">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><strong style="font-family:Orbitron">STAT & ENK</strong></div>
        <div style="font-size:13px;color:var(--dim)">LVL <span id="h-lvl">1</span></div>
      </div>
      <div style="margin-top:8px">GOLD: <b id="h-gold">0</b></div>
      <div>GQT: <b id="h-gqt">50</b></div>

      <div class="slabel">Yetenek Ağacı</div>
      <div id="skill-tree"></div>

      <div class="slabel">Gemi Ekipmanları</div>
      <div id="equip-list"></div>

      <div class="slabel">Çanta (20)</div>
      <div id="inv-grid" class="inv-grid"></div>

      <div class="slabel">KUTU</div>
      <div style="display:flex;gap:8px">
        <button class="btn cyan" id="open-1-side">1 AÇ</button>
        <button class="btn cyan" id="open-10-side">10 AÇ</button>
      </div>

      <div style="height:40px"></div>
    </div><!-- /sidebar -->
  </div><!-- /main -->
</div><!-- /root -->

<script>
/* -------------------------
   Part 1 JS: shared state, utilities, drawing primitives
   ------------------------- */
(function(){
  'use strict';

  // Utilities
  const $ = id => document.getElementById(id);
  const fmt = n => (n>=1e9?Math.round(n/1e9)+'B':n>=1e6?Math.round(n/1e6)+'M':n>=1e3?Math.round(n/1e3)+'K':''+Math.floor(n));
  const rnd = (a,b) => a + Math.random()*(b-a);
  const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

  // Rarity colors & slot definitions
  const RARS = ['bronze','silver','gold','platinum','diamond','radianium','glitchanium'];
  const RCOL = { bronze:'#cd7f32', silver:'#c0c0c0', gold:'#ffd700', platinum:'#e5e4e2', diamond:'#a8f0ff', radianium:'#ff88ff', glitchanium:'#cc44ff' };
  const SLOTS = {
    weapon:{label:'Lazer',icon:'🔫',statKey:'atk'},
    hull:{label:'Gövde',icon:'🛡️',statKey:'hp'},
    engine:{label:'Motor',icon:'⚙️',statKey:'spd'},
    shield:{label:'Kalkan',icon:'🔵',statKey:'def'},
    reactor:{label:'Reaktör',icon:'⚡',statKey:'gqt_max'},
    sensor:{label:'Sensör',icon:'📡',statKey:'crit'},
    armor:{label:'Zırh',icon:'🔩',statKey:'def'}
  };

  // Enemy types used to scale waves
  const ENEMY_TYPES = [
    {name:'Anomali', col:'#ff3355', baseHp:24, baseDmg:4, xp:6, gold:4},
    {name:'Glitchör', col:'#ff00aa', baseHp:72, baseDmg:18, xp:24, gold:18},
    {name:'Voidar', col:'#aa44ff', baseHp:240, baseDmg:70, xp:90, gold:60},
    {name:'Nexus', col:'#ffd700', baseHp:1100, baseDmg:450, xp:420, gold:240}
  ];

  // Game state (persisted)
  const SKEY = 'gq_split_v3';
  let gs = {
    charLvl:1, charXp:0, charXpNext:100,
    shipLvl:1, essence:0, essenceMax:100,
    hp:100, maxHp:100, gqtEnergy:0, maxGqtEnergy:100,
    stats:{str:10,agi:10,int:10,lck:5},
    gold:0, gqt:50, boxes:10,
    wave:1, subwave:1, // subwave 1..10
    activeBoxGroups:0,
    equipped:{weapon:null,hull:null,engine:null,shield:null,reactor:null,sensor:null,armor:null},
    bag:new Array(20).fill(null),
    autoOpen:false, autoEquip:false, autoSell:false, autoSellBag:false,
    skillsOwned:[], bossDefeated:[]
  };

  function save(){ try{ localStorage.setItem(SKEY, btoa(JSON.stringify(gs))); }catch(e){} }
  function load(){ try{ const d=localStorage.getItem(SKEY); if(d) Object.assign(gs, JSON.parse(atob(d))); }catch(e){} }

  // Canvas & rendering state
  let gc, gctx, sc, sctx;
  let W=1000, H=600, lastT=0, shipPulse=0, playerY=300;
  let enemies=[], projs=[], pProjs=[], particles=[];
  let lootPaused=false, pendingLoot=null, bossFightActive=false, activeSpecialBoss=null;

  // Expose to window for part2 to use
  window._GQCORE = {
    $,$,fmt,rnd,clamp,RCOL,SLOTS,ENEMY_TYPES,
    gs,enemies,projs,pProjs,particles,
    load,save,
    setCanvasRefs
  };

  // Provide a function for scripts to initialize canvas refs (part2 will call this)
  function setCanvasRefs(canvas){
    gc = canvas;
    gctx = gc.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
  }
  function resizeCanvas(){
    const parent = gc.parentElement;
    const rect = parent.getBoundingClientRect();
    W = Math.max(600, Math.floor(rect.width));
    H = Math.max(360, Math.floor(rect.height));
    gc.width = W; gc.height = H;
    playerY = H*0.5;
  }

  // Ship draw function (improved neon-grid, dual engine, dome cockpit)
  function drawShip(ctx,x,y,pulse,scale=1, equipped = gs.equipped){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(scale,scale);

    // choose hull and accent colors depending on equipped hull/weapon
    const hull = equipped.hull, weapon = equipped.weapon, engine = equipped.engine, shield = equipped.shield;
    const hullCol = hull? (RCOL[hull.rar] || '#1b2b48') : '#1b2b48';
    const accent  = weapon? (RCOL[weapon.rar] || '#00f5ff') : '#00f5ff';
    const glow    = shield? (RCOL[shield.rar] || '#00f5ff') : '#00f5ff';

    // outer glow
    const gr = ctx.createRadialGradient(0,0,4,0,0,48);
    gr.addColorStop(0, glow+'44'); gr.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.ellipse(0,0,46,28,0,0,Math.PI*2); ctx.fillStyle = gr; ctx.fill();

    // main hull
    const bg = ctx.createLinearGradient(-30,-14,30,14);
    bg.addColorStop(0,hullCol); bg.addColorStop(.4,accent+'12'); bg.addColorStop(1,hullCol);
    ctx.beginPath();
    ctx.moveTo(40,0);
    ctx.bezierCurveTo(36,-12,12,-20,-6,-18);
    ctx.lineTo(-24,-12); ctx.lineTo(-24,12); ctx.lineTo(-6,16);
    ctx.bezierCurveTo(12,18,36,10,40,0);
    ctx.closePath();
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = accent+'66'; ctx.lineWidth = 0.7; ctx.stroke();

    // neon grid lines (approx)
    ctx.strokeStyle = accent+'55'; ctx.lineWidth = 0.7;
    for(let gx=-16; gx<=24; gx+=8){ ctx.beginPath(); ctx.moveTo(gx,-12); ctx.lineTo(gx,12); ctx.stroke(); }
    for(let gy=-8; gy<=8; gy+=4){ ctx.beginPath(); ctx.moveTo(-18,gy); ctx.lineTo(28,gy); ctx.stroke(); }

    // cockpit dome
    const ck = ctx.createRadialGradient(8,-1,1,8,-1,9);
    ck.addColorStop(0, '#aaffff'); ck.addColorStop(.45, accent+'cc'); ck.addColorStop(1, '#004a6b00');
    ctx.beginPath(); ctx.ellipse(8,-1,9.5,7,0,0,Math.PI*2); ctx.fillStyle = ck; ctx.fill();
    ctx.strokeStyle = accent+'99'; ctx.lineWidth=.9; ctx.stroke();

    // top cannon
    ctx.fillStyle = '#07101a'; ctx.fillRect(12,-16,14,5);
    const canG = ctx.createRadialGradient(32,-16,0,32,-16,4); canG.addColorStop(0,accent); canG.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(32,-16,3,0,Math.PI*2); ctx.fillStyle = canG; ctx.fill();

    // lower gun
    ctx.fillStyle = '#07101a'; ctx.fillRect(12,12,12,4);
    ctx.fillStyle = accent+'66'; ctx.fillRect(16,13,8,2);

    // engines (dual) with red exhaust
    const eL = 18 + Math.sin(pulse)*6;
    [-12,12].forEach((ey,i)=>{
      const ex = -22;
      const pg = ctx.createLinearGradient(ex,ey-5,ex,ey+5);
      pg.addColorStop(0,'#2a1822'); pg.addColorStop(1,'#0b0510');
      ctx.fillStyle = pg; ctx.beginPath(); ctx.rect(ex,ey-5,16,10); ctx.fill();
      // exhaust flame
      const eg = ctx.createLinearGradient(ex - eL, ey, ex, ey);
      eg.addColorStop(0,'rgba(255,80,80,0)'); eg.addColorStop(.5,'rgba(255,40,60,.45)'); eg.addColorStop(1,'rgba(255,20,40,.65)');
      ctx.beginPath(); ctx.moveTo(ex,ey-6); ctx.lineTo(ex - eL, ey); ctx.lineTo(ex,ey+6); ctx.closePath(); ctx.fillStyle = eg; ctx.fill();
    });

    // small running lights
    [[22,-3,'#00ff88'],[22,3,'#ff3355'],[-18, -11, accent]].forEach(([lx,ly,lc])=>{
      ctx.beginPath(); ctx.arc(lx,ly,1.8,0,Math.PI*2); ctx.fillStyle = lc; ctx.shadowColor = lc; ctx.shadowBlur = 6 + Math.sin(pulse)*2; ctx.fill(); ctx.shadowBlur = 0;
    });

    ctx.restore();
  }

  // Enemy draw routine
  function drawEnemy(ctx,e){
    ctx.save(); ctx.translate(e.x,e.y);
    const s = e.isBoss? 40 : 14;
    // body
    ctx.beginPath();
    ctx.moveTo(s,0); ctx.bezierCurveTo(s-6,-s/2,2,-s,-(s/2),-s/1.6);
    ctx.lineTo(-s-6, -s/2); ctx.lineTo(-s-6,s/2); ctx.lineTo(-(s/2), s/1.6);
    ctx.bezierCurveTo(2,s, s-6,s/2, s,0); ctx.closePath();
    ctx.fillStyle = e.col; ctx.fill();
    ctx.strokeStyle = '#00000066'; ctx.lineWidth = .6; ctx.stroke();
    // cockpit glow
    ctx.beginPath(); ctx.ellipse(5,0,3.5,2.5,0,0,Math.PI*2); ctx.fillStyle = e.col+'cc'; ctx.fill();
    ctx.restore();
  }

  // Expose drawing functions and state to part2
  window._GQCORE.drawShip = drawShip;
  window._GQCORE.drawEnemy = drawEnemy;
  window._GQCORE.setCanvasRefs = setCanvasRefs;
  window._GQCORE.resizeCanvas = resizeCanvas;

  // load saved state immediately
  load();
  // end of part1 IIFE
})();
</script>
