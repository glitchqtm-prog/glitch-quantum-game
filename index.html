<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Glitch Quantum: Infinite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="scrolling-scene">
            <div id="player">👤</div>
            <div id="enemy">👾</div>
        </div>
        <div id="ui">
            <p>Enerji (GQT): <span id="energy">100</span></p>
            <button id="attack-btn">SALDIR & İLERLE</button>
        </div>
    </div>
    <script>
        let energy = 100;
        document.getElementById('attack-btn').addEventListener('click', () => {
            if (energy > 0) {
                energy -= 5;
                document.getElementById('energy').innerText = energy;
                alert("Düşman yok edildi, ilerleniyor...");
            } else {
                alert("Enerji bitti! Görevleri yap, Quantum Kutusu kazan.");
            }
        });
    </script>
</body>
</html>
