<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Glitch Quantum: Savaş</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Glitch Hunter vs Corruption</h1>
        <div id="battle-field">
            <div id="player" class="char">👤 Hunter</div>
            <button id="attack-btn">SALDIR</button>
            <div id="enemy" class="char">👾 Glitch</div>
        </div>
        <div id="stats">
            <p>Seviye: <span id="level">1</span> | GQT: <span id="score">0</span></p>
            <p>Düşman HP: <span id="hp">100</span>/100</p>
        </div>
    </div>
    <script>
        let score = 0, level = 1, hp = 100;
        document.getElementById('attack-btn').addEventListener('click', () => {
            hp -= 10;
            if (hp <= 0) {
                score += 50;
                hp = 100 + (level * 20);
                level++;
                alert("Sistem temizlendi!");
            }
            document.getElementById('hp').innerText = hp;
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
        });
    </script>
</body>
</html>
