<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Glitch Quantum: Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Glitch Hunter Modu</h1>
        <div id="stats">
            <p>Seviye: <span id="level">1</span> | Puan: <span id="score">0</span></p>
            <p>Düşman HP: <span id="hp">100</span>/100</p>
        </div>
        <button id="attack-btn">SALDIR (GLITCH'İ AVLA)</button>
    </div>

    <script>
        let score = 0, level = 1, hp = 100;
        const btn = document.getElementById('attack-btn');

        btn.addEventListener('click', () => {
            // Kritik Vuruş (%20 şans)
            let damage = Math.random() < 0.2 ? 25 : 5;
            hp -= damage;
            
            // Görsel efekt
            document.body.style.backgroundColor = "#220022";
            setTimeout(() => document.body.style.backgroundColor = "#050505", 100);

            if (hp <= 0) {
                score += 50 * level;
                level++;
                hp = 100 + (level * 20);
                alert("Yaratık yok edildi! Yeni sistem seviyesi: " + level);
            }
            document.getElementById('hp').innerText = hp;
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
        });
    </script>
</body>
</html>
