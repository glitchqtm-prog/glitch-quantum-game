<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GLITCH QUANTUM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{
  --bg:#03040c;--bg2:#050712;--brd:#1a2460;
  --cy:#00f5ff;--mg:#ff00aa;--gd:#ffd700;--gr:#00ff88;
  --rd:#ff3355;--tx:#c0d0ff;--dm:#4a5888;--pu:#aa44ff;
  --sc:0 0 12px #00f5ff88,0 0 30px #00f5ff22;
  --sm:0 0 12px #ff00aa88,0 0 30px #ff00aa22;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Share Tech Mono',monospace;}
#root{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
#hdr{display:flex;align-items:center;gap:8px;padding:4px 12px;border-bottom:1px solid var(--brd);background:#02030a;flex-shrink:0;flex-wrap:wrap;}
#logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;color:var(--cy);text-shadow:var(--sc);letter-spacing:3px;white-space:nowrap;}
#logo em{color:var(--mg);font-style:normal;}
#hud{display:flex;gap:10px;font-size:9px;flex:1;flex-wrap:wrap;align-items:center;}
.hi label{color:var(--dm);}.hi b{color:var(--cy);}
.hi.gd b{color:var(--gd);}.hi.mg b{color:var(--mg);}
#mkt-btn{background:linear-gradient(135deg,var(--mg),#660033);border:none;color:#fff;
  font-family:'Share Tech Mono',monospace;font-size:9px;padding:5px 11px;cursor:pointer;
  border-radius:4px;white-space:nowrap;letter-spacing:1px;box-shadow:var(--sm);}
#mkt-btn:hover{opacity:.85;}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden;}
#czone{flex:1;position:relative;overflow:hidden;background:var(--bg2);}

/* TOOLTIPS, HUD, SKILL BAR etc */
canvas{display:block;}
#clog{position:absolute;top:8px;left:8px;width:230px;max-height:160px;overflow:hidden;pointer-events:none;z-index:60;}
.clog-line{font-size:10px;line-height:1.5;animation:lf 6s forwards;white-space:nowrap;color:var(--tx)}
@keyframes lf{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
#wave-badge{position:absolute;top:8px;right:8px;background:#07101dcc;border:1px solid var(--mg);
  padding:4px 12px;font-family:'Orbitron',sans-serif;font-size:10px;color:var(--mg);
  border-radius:4px;z-index:60;text-align:right;line-height:1.7;}
#upg-bar{position:absolute;bottom:74px;left:50%;transform:translateX(-50%);
  background:#07101dcc;border:1px solid var(--cy);border-radius:20px;padding:3px 13px;
  display:none;font-size:9px;color:var(--cy);white-space:nowrap;z-index:70;}

/* LOOT POPUP */
#loot-overlay{position:absolute;inset:0;background:#010308cc;z-index:140;display:none;}
#loot-pop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.95);
  background:#02050bfa;border:2px solid var(--mg);border-radius:14px;padding:18px 24px;
  text-align:center;z-index:150;display:none;min-width:275px;box-shadow:var(--sm);}
#loot-pop .lp-ic{font-size:42px;margin-bottom:4px;}
#loot-pop .lp-rar{font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px;}
#loot-pop .lp-nm{font-size:14px;font-family:'Orbitron',sans-serif;margin:3px 0;}
#loot-pop .lp-st{font-size:9px;color:var(--tx);margin-bottom:4px;line-height:1.6;}
#loot-pop .lp-btns{display:flex;gap:7px;margin-top:10px;}
#loot-pop .lp-btn{flex:1;padding:7px 0;border:none;font-family:'Share Tech Mono',monospace;
  font-size:9px;cursor:pointer;border-radius:5px;letter-spacing:.5px;}
.btn-eq{background:var(--cyan);color:#020810;}
.btn-sell{background:#12243a;color:var(--gd);border:1px solid var(--gd);}
.btn-bag{background:#0f1e38;color:var(--tx);border:1px solid var(--brd);}

/* SIDEBAR */
#sidebar{width:292px;border-left:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;background:#04051a;}
#tabbar{display:flex;border-bottom:1px solid var(--brd);flex-shrink:0;}
.tb{flex:1;padding:6px 4px;background:none;border:none;color:var(--dm);
  font-family:'Share Tech Mono',monospace;font-size:9px;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;}
.tb.on{color:var(--cy);border-bottom-color:var(--cy);}
.tpanel{display:none;flex-direction:column;flex:1;overflow-y:auto;padding:8px;}
.tpanel.on{display:flex;}
.slabel{font-size:8px;letter-spacing:2px;color:var(--dm);text-transform:uppercase;margin:6px 0 3px;border-bottom:1px solid var(--brd);padding-bottom:2px;}
.equip-slot{background:#07101e;border:1px solid var(--brd);border-radius:6px;padding:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;color:var(--tx)}
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px}
.inv-slot{aspect-ratio:1;background:#07101e;border:1px solid var(--brd);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.inv-slot.empty{opacity:.18}

/* TOOLTIPS */
#sk-tip,#it-tip{position:fixed;background:#02050bfa;border:1px solid var(--cy);
  padding:9px 12px;border-radius:6px;font-size:9px;pointer-events:none;z-index:200;
  max-width:190px;display:none;}
#sk-tip .stn{font-size:12px;font-family:'Orbitron',sans-serif;color:var(--cy);margin-bottom:4px;}

/* misc */
*::-webkit-scrollbar{width:6px;}*::-webkit-scrollbar-thumb{background:var(--brd);}
</style>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div id="logo">GLITCH<em>QUANTUM</em></div>
    <div id="hud">
      <div class="hi"><label>LVL </label><b id="h-lvl">1</b></div>
      <div class="hi"><label>SHIP </label><b id="h-slvl">1</b></div>
      <div class="hi"><label>ÖZ </label><b id="h-ess" style="color:var(--pu)">0</b></div>
      <div class="hi gd"><label>💰 </label><b id="h-gold">0</b></div>
      <div class="hi"><label>💠 </label><b id="h-gqt">50</b></div>
      <div class="hi"><label>📦 </label><b id="h-boxes">10</b></div>
      <div class="hi"><label>KILL </label><b id="h-kills">0</b></div>
      <div class="hi"><label>WAVE </label><b id="h-wave">1-1</b></div>
    </div>
    <button id="mkt-btn" onclick="GQ.openMkt()">🏪 MARKET</button>
  </div>

  <div id="main">
    <div id="czone">
      <canvas id="gc"></canvas>

      <!-- IDLE SCREEN -->
      <div id="idle-sc" style="display:none"></div>

      <!-- LOOT OVERLAY + POPUP -->
      <div id="loot-overlay"></div>
      <div id="loot-pop">
        <div class="lp-ic" id="lp-ic">⚔️</div>
        <div class="lp-rar" id="lp-rar"></div>
        <div class="lp-stars" id="lp-stars"></div>
        <div class="lp-nm" id="lp-nm"></div>
        <div class="lp-type" id="lp-type"></div>
        <div class="lp-stats" id="lp-stats"></div>
        <div class="lp-af" id="lp-af"></div>
        <div class="lp-cmp" id="lp-cmp" style="display:none"></div>
        <div class="lp-note" id="lp-note"></div>
        <div id="as-bar" style="display:none"></div>
        <div class="lp-btns">
          <button class="lp-btn btn-eq" id="btn-eq">⚔️ KUŞAN</button>
          <button class="lp-btn btn-sell" id="btn-sell">💰 SAT</button>
          <button class="lp-btn btn-bag" id="btn-bag">🎒 ÇANTA</button>
        </div>
      </div>

      <div id="clog"></div>
      <div id="wave-badge">WAVE <span id="wb-wave">1</span>-<span id="wb-sub">1</span></div>
      <div id="upg-bar">⚙️ <span id="ub-txt">Gemi Yükseltiliyor</span></div>
    </div><!-- /czone -->

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:Orbitron;font-size:14px;color:var(--cy)">STAT & ENK</div>
        <div style="font-size:12px;color:var(--dm)">LVL <span id="s-lvl">1</span></div>
      </div>
      <div style="margin-top:10px">GOLD: <b id="h-gold">0</b></div>
      <div>GQT: <b id="h-gqt">50</b></div>

      <div class="slabel">Yetenek Ağacı</div>
      <div id="skill-tree"></div>

      <div class="slabel">Gemi Ekipmanları</div>
      <div id="equip-list"></div>

      <div class="slabel">Çanta (20)</div>
      <div id="inv-grid" class="inv-grid"></div>

      <div style="margin-top:12px" class="slabel">KUTU</div>
      <div style="display:flex;gap:8px">
        <button class="btn cyan" id="open-1">1 AÇ</button>
        <button class="btn cyan" id="open-10">10 AÇ</button>
      </div>
    </div><!-- /sidebar -->
  </div><!-- /main -->
</div><!-- /root -->

<script>
/*
  Full game engine — integrated, complete version.
  Based on your earlier V2 submission; cleaned up spawn positions, scope issues,
  and merged UI + game loop in a single file for direct use as index.html.
*/

const GQ = (() => {
  'use strict';

  // Utilities
  const $ = id => document.getElementById(id);
  const fmt = n => { if(n>=1e12) return (n/1e12).toFixed(1)+'T'; if(n>=1e9) return (n/1e9).toFixed(1)+'B'; if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return Math.floor(n)+''; };
  const rnd = (a,b) => a + Math.random()*(b-a);
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

  // Rarities, slots
  const RARS=['bronze','silver','gold','platinum','diamond','radianium','glitchanium'];
  const RLBL={bronze:'BRONZ',silver:'SİLVER',gold:'ALTIN',platinum:'PLATİNYUM',diamond:'DİAMOND',radianium:'RADİANİUM',glitchanium:'GLİTCHANİUM'};
  const RCOL={bronze:'#cd7f32',silver:'#c0c0c0',gold:'#ffd700',platinum:'#e5e4e2',diamond:'#a8f0ff',radianium:'#ff88ff',glitchanium:'#cc44ff'};

  const SLOTS={
    weapon: {label:'Lazer Silahı',icon:'🔫',shipPart:'cannon',statKey:'atk'},
    hull:   {label:'Gemi Gövdesi',icon:'🛡️',shipPart:'hull',statKey:'hp'},
    engine: {label:'Motor',icon:'⚙️',shipPart:'engine',statKey:'spd'},
    shield: {label:'Kalkan',icon:'🔵',shipPart:'shield',statKey:'def'},
    reactor:{label:'Reaktör',icon:'⚡',shipPart:'reactor',statKey:'gqt_max'},
    sensor: {label:'Sensör',icon:'📡',shipPart:'sensor',statKey:'crit'},
    armor:  {label:'Zırh',icon:'🔩',shipPart:'armor',statKey:'def'}
  };

  // Enemy types
  const ENEMY_TYPES=[
    {name:'Anomali', col:'#ff3355', baseHp:20, baseDmg:3, xp:5, gold:2},
    {name:'Glitchör',col:'#ff00aa', baseHp:40, baseDmg:8, xp:12, gold:8},
    {name:'Voidar',  col:'#aa44ff', baseHp:120, baseDmg:28, xp:40, gold:24},
    {name:'Nexus',   col:'#ffd700', baseHp:400, baseDmg:120, xp:200, gold:120}
  ];

  // Persistence key
  const SKEY='gq_combined_save_v1';

  // State (single object, accessible to all functions)
  const state = {
    // char & ship
    charLvl:1,charXp:0,charXpNext:100,
    shipLvl:1,shipXp:0,shipXpNext:100,
    essence:0,essenceMax:100,
    hp:100,maxHp:100,gqtEnergy:0,maxGqtEnergy:100,
    stats:{str:10,agi:10,int:10,lck:5},
    kills:0,gqt:50,gold:0,pCrystals:0,speedups:0,
    wave:1,subwave:1,
    equipped:{weapon:null,hull:null,engine:null,shield:null,reactor:null,sensor:null,armor:null},
    bag:new Array(20).fill(null),
    skillCDs:[0,0,0,0],glitchSkills:[],
    passive:{atk:[0,0],def:[0,0],spd:[0,0]},
    quests:[],
    boxes:10,
    activeBoxGroups:0,
    marketDaily:{},
    bossDefeated:[],
    lastOnline:Date.now(),
    pendingLoot:null,
    lootPaused:false,
    activeSpecialBoss:null
  };

  function save(){
    try{ localStorage.setItem(SKEY, btoa(JSON.stringify(state))); }catch(e){}
  }
  function load(){
    try{ const s = localStorage.getItem(SKEY); if(s) Object.assign(state, JSON.parse(atob(s))); }catch(e){}
  }

  // Canvas & rendering
  const gc = $('gc'), ctx = gc.getContext('2d');
  let W = 800, H = 480, lastT=0, shipPulse=0;
  let enemies=[], projs=[], pProjs=[], particles=[];

  function resize(){
    const rect = gc.parentElement.getBoundingClientRect();
    W = Math.max(700, Math.floor(rect.width));
    H = Math.max(420, Math.floor(rect.height));
    gc.width = W; gc.height = H;
  }
  window.addEventListener('resize', resize);
  resize();

  // ship draw improved (neon/pixel-like)
  function drawShip(ctx, cx, cy, pulse, scale=1){
    ctx.save(); ctx.translate(cx,cy); ctx.scale(scale,scale);
    const hull = state.equipped.hull, weapon = state.equipped.weapon, engine = state.equipped.engine, shield = state.equipped.shield;
    const hullCol = hull ? (RCOL[hull.rar] || '#1e2a4a') : '#1e2a4a';
    const accent = weapon ? (RCOL[weapon.rar] || '#00f5ff') : '#00f5ff';
    const engCol = engine ? (RCOL[engine.rar] || '#ff4422') : '#ff4422';
    const shCol = shield ? (RCOL[shield.rar] || '#00ff88') : '#00ff88';

    // engine exhausts
    const eL = 30 + Math.sin(pulse)*10;
    [-12,12].forEach((ey,i)=>{
      const eg = ctx.createLinearGradient(-22-eL,ey-5,-22,ey);
      eg.addColorStop(0,'rgba(0,0,0,0)'); eg.addColorStop(.35,engCol+'88'); eg.addColorStop(1,engCol);
      ctx.beginPath(); ctx.moveTo(-22,ey-5); ctx.lineTo(-22-eL,ey+(i===0?-1:1)); ctx.lineTo(-22,ey+5); ctx.closePath(); ctx.fillStyle=eg; ctx.fill();
    });

    // reactor core
    const rcg = ctx.createRadialGradient(-8,0,0,-8,0,4); rcg.addColorStop(0,'#050d1a'); rcg.addColorStop(.5,engCol+'88'); rcg.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.rect(-14,-5,10,10); ctx.fillStyle='#050d1a'; ctx.fill();
    ctx.beginPath(); ctx.arc(-8,0,4.5,0,Math.PI*2); ctx.fillStyle=rcg; ctx.fill();

    // hull main fuselage
    const bg = ctx.createLinearGradient(-16,-14,26,14);
    bg.addColorStop(0,hullCol); bg.addColorStop(.4,accent+'18'); bg.addColorStop(1,hullCol);
    ctx.beginPath();
    ctx.moveTo(30,0);
    ctx.bezierCurveTo(26,-8,8,-16,-6,-14);
    ctx.lineTo(-20,-12); ctx.lineTo(-20,12); ctx.lineTo(-6,14);
    ctx.bezierCurveTo(8,16,26,8,30,0);
    ctx.closePath();
    ctx.fillStyle=bg; ctx.fill();
    ctx.strokeStyle=accent+'66'; ctx.lineWidth=.9; ctx.stroke();

    // grid lines
    ctx.strokeStyle=accent+'33'; ctx.lineWidth=.5;
    [-6,0,6].forEach(gy=>{ ctx.beginPath(); ctx.moveTo(-16,gy); ctx.lineTo(26,gy); ctx.stroke(); });

    // dome cockpit
    const dg = ctx.createRadialGradient(8,-1,1,8,-1,9.5);
    dg.addColorStop(0,'#ccffff'); dg.addColorStop(.45,accent+'cc'); dg.addColorStop(1,accent+'44');
    ctx.beginPath(); ctx.ellipse(8,-.5,9.5,7,0,0,Math.PI*2); ctx.fillStyle=dg; ctx.fill();
    ctx.strokeStyle=accent+'99'; ctx.lineWidth=.9; ctx.stroke();

    // cannons
    ctx.fillStyle='#0a1828'; ctx.fillRect(10,-17,14,5);
    ctx.fillStyle=accent+'88'; ctx.fillRect(16,-16,14,2);
    const ctg = ctx.createRadialGradient(30,-15,0,30,-15,3);
    ctg.addColorStop(0,accent); ctg.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(30,-15,3,0,Math.PI*2); ctx.fillStyle=ctg; ctx.fill();

    // running lights
    [[22,-3,'#00ff88'],[22,3,'#ff3355'],[-19,-11,'#aa44ff']].forEach(([lx,ly,lc])=>{
      ctx.beginPath(); ctx.arc(lx,ly,1.8,0,Math.PI*2);
      ctx.fillStyle=lc; ctx.shadowColor=lc; ctx.shadowBlur=5+Math.sin(pulse)*2; ctx.fill(); ctx.shadowBlur=0;
    });

    ctx.restore();
  }

  // enemy draw
  function drawEnemy(ctx,e){
    ctx.save(); ctx.translate(e.x,e.y); ctx.scale(e.isBoss?1.3:1, e.isBoss?1.3:1);
    // hull
    const col = e.col || '#ff3355';
    const bg = ctx.createLinearGradient(-12,-7,14,7); bg.addColorStop(0,'#160312'); bg.addColorStop(.5,col+'18'); bg.addColorStop(1,'#0a0210');
    ctx.beginPath();
    ctx.moveTo(14,0); ctx.bezierCurveTo(10,-5,2,-8,-8,-6); ctx.lineTo(-12,-3.5); ctx.lineTo(-12,3.5); ctx.lineTo(-8,6);
    ctx.bezierCurveTo(2,8,10,5,14,0); ctx.closePath(); ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = col+'77'; ctx.lineWidth=.8; ctx.stroke();
    // cockpit glow
    const cg = ctx.createRadialGradient(4,0,0,4,0,5); cg.addColorStop(0,col+'ff'); cg.addColorStop(.5,col+'88'); cg.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.ellipse(4,0,5,3.5,0,0,Math.PI*2); ctx.fillStyle=cg; ctx.shadowColor=col; ctx.shadowBlur=5; ctx.fill(); ctx.shadowBlur=0;
    ctx.restore();
  }

  // mkEnemy uses visible Y range and spawns at right side
  function mkEnemy(wave, sub){
    const ti = Math.min(Math.floor((wave-1)/3), ENEMY_TYPES.length-1);
    const et = ENEMY_TYPES[ti];
    const sc = Math.pow(1.18,wave-1)*Math.pow(1.28,state.shipLvl-1);
    const hp = Math.ceil(et.baseHp*sc);
    const dmg = Math.ceil(et.baseDmg*Math.pow(1.1,wave-1)*Math.pow(1.18,state.shipLvl-1));
    const x = W + 60 + Math.random()*160;
    const y = Math.floor(H*0.2 + Math.random()*(H*0.6));
    return {name:et.name,col:et.col,isBoss:false,hp:hp,maxHp:hp,dmg:dmg,x:x,y:y,stopX:Math.floor(W*0.7),spd:50+rnd(0,35),shootT:rnd(.8,2),dead:false,xp:Math.ceil(5*et.xp*sc),gold:Math.ceil(2*et.gold*Math.pow(1.05,wave-1))};
  }

  // spawn group for current box (handles subwaves & boss on subwave 10)
  function spawnGroupForCurrentBox(){
    resizeIfNeeded();
    enemies = [];
    const wave = state.wave, sub = state.subwave;
    if(sub < 10){
      const cnt = 3 + Math.min(12, 2 + Math.floor(state.wave*0.35) + sub);
      for(let i=0;i<cnt;i++){
        const e = mkEnemy(wave, sub);
        e.x += i*26; e.y = Math.max(70, Math.min(H-70, Math.floor(H*0.25 + (i*(H*0.5/cnt)) + Math.random()*22)));
        enemies.push(e);
      }
      addLog(`🌊 Dalga ${wave}-${sub} — ${cnt} düşman`, '#ff00aa');
    } else {
      const bossHp = Math.ceil(500*Math.pow(1.2,wave-1)*Math.pow(1.28,state.shipLvl-1));
      const boss = {name:`WAVE BOSS ${wave}`,col:'#ffd700',isBoss:true,hp:bossHp,maxHp:bossHp,dmg:Math.ceil(20*Math.pow(1.12,wave-1)),xp:Math.ceil(100*wave),gold:Math.ceil(50*wave),x:Math.floor(W*0.6),y:Math.floor(H*0.5),stopX:Math.floor(W*0.6),dead:false,spd:28};
      enemies.push(boss);
      addLog(`🔥 BOSS: ${boss.name} geldi!`, '#ffd700');
    }
    renderUI();
  }

  // Item generation and loot handling
  function generateItem(){
    const rar = rollRar(state.charLvl);
    const ri = RARS.indexOf(rar);
    const stars = Math.floor(Math.random()*5)+1;
    const slots = Object.keys(SLOTS);
    const slotKey = slots[Math.floor(Math.random()*slots.length)];
    const base = [8,20,50,130,340,900,2500][ri] || 10;
    const sv = Math.round(base*Math.pow(state.shipLvl,1.2)*Math.pow(1.12,stars));
    const sellVal = Math.ceil((ri+1) * sv * 0.06);
    return {slotKey,rar,ri,stars,name:`${RLBL[rar]} ${SLOTS[slotKey].label}`,icon:SLOTS[slotKey].icon,sv,affs:[],sellVal,statKey:SLOTS[slotKey].statKey};
  }

  function showLoot(item){
    state.pendingLoot = item;
    $('loot-overlay').style.display = 'block';
    $('loot-pop').style.display = 'block';
    $('lp-ic').textContent = item.icon;
    $('lp-rar').textContent = RLBL[item.rar]; $('lp-rar').style.color = RCOL[item.rar];
    $('lp-nm').textContent = item.name;
    $('lp-stats').textContent = `+${fmt(item.sv)} ${item.statKey.toUpperCase()}`;
    state.lootPaused = true;

    // auto behaviours
    if(state.autoEquip){
      const cur = state.equipped[item.slotKey]; const curVal = cur?cur.sv:0;
      if(item.sv > curVal){ setTimeout(()=>lootEquip(),400); return; }
    }
    if(state.autoSell){
      const cur = state.equipped[item.slotKey]; const curVal = cur?cur.sv:0;
      if(item.sv <= curVal){ setTimeout(()=>lootSell(),700); return; }
    }
  }
  function closeLoot(){
    state.pendingLoot = null; $('loot-overlay').style.display='none'; $('loot-pop').style.display='none'; state.lootPaused=false;
  }
  function lootEquip(){
    const item = state.pendingLoot; if(!item) return;
    const old = state.equipped[item.slotKey];
    if(old){ const idx = state.bag.findIndex(x=>x===null); if(idx!==-1) state.bag[idx]=old; }
    state.equipped[item.slotKey] = item;
    addLog(`✅ ${item.name} kuşanıldı!`,RCOL[item.rar]);
    closeLoot(); finishAfterLoot(); save(); renderPanels();
  }
  function lootSell(){
    const item = state.pendingLoot; if(!item) return;
    state.gold += item.sellVal;
    addLog(`💰 Satıldı: +${fmt(item.sellVal)} Gold`,RCOL[item.rar]);
    closeLoot(); finishAfterLoot(); save();
  }
  function lootBag(){
    const idx = state.bag.findIndex(x=>x===null);
    if(idx===-1){ addLog('⚠️ Çanta dolu!','#ff3355'); return; }
    state.bag[idx] = state.pendingLoot;
    addLog(`🎒 Çantaya eklendi: ${state.pendingLoot.name}`,'#c0d0ff');
    closeLoot(); finishAfterLoot(); save(); renderPanels();
  }
  function finishAfterLoot(){
    state.activeBoxGroups = Math.max(0, state.activeBoxGroups - 1);
    if(state.subwave < 10) state.subwave++; else { state.subwave = 1; state.wave++; }
    if(state.activeBoxGroups > 0) spawnGroupForCurrentBox();
    else addLog('⏸️ Grup tamamlandı.', '#88a');
    renderUI();
  }

  // Auto-attack, projectiles and combat loop
  let aaTimer=0;
  function autoAtk(dt){
    if(state.lootPaused) return;
    aaTimer -= dt; if(aaTimer>0) return;
    const csSpd = 0.9 + state.stats.agi*0.04;
    aaTimer = 1 / csSpd;
    const alive = enemies.filter(e=>!e.dead); if(!alive.length) return;
    const tgt = alive.reduce((a,b)=>a.x<b.x?a:b);
    const dx = tgt.x - 130, dy = tgt.y - H*0.5, dist = Math.hypot(dx,dy)||1;
    pProjs.push({x:130+26,y:H*0.5,vx:(dx/dist)*420,vy:(dy/dist)*420,dmg:Math.ceil(10 + state.charLvl*1.8),life:1.2,isCrit:false});
  }

  function updateProjectiles(dt){
    for(let i=pProjs.length-1;i>=0;i--){
      const p = pProjs[i]; p.x += p.vx*dt; p.y += p.vy*dt; p.life-=dt;
      for(let j=0;j<enemies.length;j++){
        const e = enemies[j]; if(e.dead) continue;
        const dx = p.x-e.x, dy = p.y-e.y; if(Math.hypot(dx,dy)<22 && p.life>0){
          e.hp -= p.dmg; spawnDmgP(e.x,e.y,p.dmg);
          pProjs.splice(i,1);
          if(e.hp<=0 && !e.dead) { e.dead=true; onEnemyKilled(e); }
          break;
        }
      }
      if(p && (p.life<=0 || p.x<-20 || p.x>W+20)) pProjs.splice(i,1);
    }
    for(let i=projs.length-1;i>=0;i--){
      const p = projs[i]; p.x += p.vx*dt; p.y += p.vy*dt; p.life-=dt;
      const dx = p.x - 130, dy = p.y - H*0.5;
      if(Math.hypot(dx,dy)<22){ spawnDmgP(130,H*0.5, Math.max(1, p.dmg - Math.floor(state.stats.def*0.2))); projs.splice(i,1); }
      if(p && (p.life<=0 || p.x<-20 || p.x>W+20)) projs.splice(i,1);
    }
  }

  function onEnemyKilled(e){
    state.charXp += e.xp || 0; state.gold += e.gold || 0; state.kills++;
    addLog(`💀 ${e.name} yok edildi +${fmt(e.xp||0)}XP +${fmt(e.gold||0)}💰`, e.col);
    spawnDeathP(e.x,e.y,e.col||e.color);
    if(Math.random() < 0.17 + state.stats.lck*0.005){
      const loot = generateItem();
      showLoot(loot);
      // keep activeBoxGroups until loot handled
    }
  }

  // Visual particle helpers
  function spawnDmgP(x,y,dmg){ particles.push({x,y:y-18,txt:dmg.toString(),col:'#ffd700',life:1.5}); }
  function spawnDeathP(x,y,col){ for(let i=0;i<7;i++){ const a=(i/7)*Math.PI*2; particles.push({x,y,vx:Math.cos(a)*80,vy:Math.sin(a)*80,txt:'✦',col,life:.7,ml:.7,sz:11}); } }

  // wave spawn and clearing
  function spawnWave(){
    const cnt = 3 + Math.min(state.wave,15);
    enemies = [];
    for(let i=0;i<cnt;i++){ setTimeout(()=>spawnEnemy(), i*(700-Math.min(state.wave*15,500))); }
    addLog(`🌊 Dalga ${state.wave} — ${cnt} düşman geliyor...`,'#ff00aa');
  }
  function spawnEnemy(){ const e = mkEnemy(state.wave, state.subwave || 1); enemies.push(e); }

  // check end state of enemies & advance
  function checkWaveClear(){
    if(enemies.length>0 && enemies.every(e=>e.dead)){
      enemies = [];
      if(state.activeBoxGroups > 0){
        // handle drop / advance (handled in update loop)
      } else {
        // idle
      }
    }
  }

  // AI and update loop
  function update(dt){
    shipPulse += dt*2.2;
    // auto-open option
    if(state.autoOpen && state.boxes>0 && !state.lootPaused) if(Math.random() < dt*0.6) openBox(1);
    // update skill cooldowns
    state.skillCDs = state.skillCDs.map(cd => Math.max(0, cd - dt));
    // auto atk & skills
    autoAtk(dt);
    // projectiles
    updateProjectiles(dt);
    // enemies behavior
    for(let e of enemies){
      if(e.dead) continue;
      if(e.x > e.stopX) e.x -= e.spd * dt;
      else {
        e.shootT -= dt;
        if(!state.lootPaused && e.shootT <= 0){
          e.shootT = rnd(.9,1.5);
          const dx = 130 - e.x, dy = H*0.5 - e.y, dist=Math.hypot(dx,dy)||1;
          projs.push({x:e.x-14,y:e.y,vx:(dx/dist)*260,vy:(dy/dist)*260,dmg:e.dmg,col:e.col,life:1.6});
        }
      }
    }
    // particles update
    for(let i=particles.length-1;i>=0;i--){ particles[i].life -= dt; particles[i].y -= dt*10; if(particles[i].life<=0) particles.splice(i,1); }
    // group cleared handling
    if(!state.lootPaused && enemies.length>0 && enemies.every(e=>e.dead)){
      enemies = [];
      if(state.activeBoxGroups > 0){
        const dropChance = 0.25 + Math.min(0.3, state.stats.lck * 0.01);
        if(Math.random() < dropChance){ const item = generateItem(); showLoot(item); } else { state.activeBoxGroups = Math.max(0, state.activeBoxGroups-1); if(state.subwave<10) state.subwave++; else { state.subwave=1; state.wave++; } if(state.activeBoxGroups>0) spawnGroupForCurrentBox(); }
      }
    }
  }

  // render loop
  function render(){
    ctx.clearRect(0,0,W,H);
    // bg
    const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#010408'); g.addColorStop(.6,'#040910'); g.addColorStop(1,'#07101e');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // stars
    for(let i=0;i<90;i++){ ctx.fillStyle='rgba(180,200,255,0.03)'; ctx.fillRect((i*37 + (Math.sin(shipPulse+i)*8)) % W, (i*53) % H, 2,2); }
    // player
    drawShip(ctx,130,H*0.5,shipPulse,1);
    // enemies
    for(let e of enemies){ if(!e.dead) drawEnemy(ctx,e); const bw = 36*(e.isBoss?1.6:1), bh = 3, hpP = (e.hp/e.maxHp); ctx.fillStyle='#1a0a0a'; ctx.fillRect(e.x-bw/2,e.y-30,bw,bh); ctx.fillStyle = e.isBoss? '#ffd700' : e.col; ctx.fillRect(e.x-bw/2,e.y-30,bw*hpP,bh); ctx.font = `${e.isBoss?9:7}px Share Tech Mono`; ctx.fillStyle=e.isBoss?'#ffd700':'#aa80c0'; ctx.textAlign='center'; ctx.fillText(e.name,e.x,e.y+(e.isBoss?28:22)); }
    // projectiles
    for(let p of projs){ ctx.fillStyle = p.col || '#ff3344'; ctx.beginPath(); ctx.arc(p.x,p.y,2.8,0,Math.PI*2); ctx.fill(); }
    for(let p of pProjs){ ctx.fillStyle = '#00f5ff'; ctx.beginPath(); ctx.arc(p.x,p.y,2.8,0,Math.PI*2); ctx.fill(); }
    // particles
    for(let p of particles){ ctx.fillStyle = p.col || '#fff'; ctx.globalAlpha = Math.max(0,p.life); ctx.fillText(p.txt,p.x,p.y); ctx.globalAlpha=1; }
  }

  // main loop
  function loop(ts){
    if(!lastT) lastT = ts; const dt = Math.min((ts-lastT)/1000, .05); lastT = ts;
    update(dt); render(); renderUI(); save(); requestAnimationFrame(loop);
  }

  // UI helpers & bindings
  function addLog(msg, color='#c0d0ff'){ const el = document.createElement('div'); el.className='clog-line'; el.textContent = msg; el.style.color = color; $('clog').appendChild(el); setTimeout(()=>{ try{$('clog').removeChild(el);}catch(e){} },6000); }
  function renderPanels(){
    $('h-gold').textContent = fmt(state.gold); $('h-gqt').textContent = fmt(state.gqt); $('h-lvl').textContent = state.charLvl; $('h-boxes').textContent = state.boxes;
    // equips
    const el = $('equip-list'); el.innerHTML = '';
    Object.keys(SLOTS).forEach(k=>{ const s = SLOTS[k]; const it = state.equipped[k]; const row = document.createElement('div'); row.className='equip-slot'; row.innerHTML = `<div><div style="font-size:14px">${s.icon} ${s.label}</div><div style="font-size:12px;color:var(--dim)">${it?it.name:'Boş'}</div></div>`; const btn = document.createElement('button'); btn.className='btn'; btn.textContent = it?'Çıkart':'—'; btn.addEventListener('click', ()=>{ if(it) unequip(k); }); row.appendChild(btn); el.appendChild(row); });
    // inventory
    const grid = $('inv-grid'); grid.innerHTML=''; for(let i=0;i<20;i++){ const v = state.bag[i]; const d = document.createElement('div'); d.className='inv-slot'+(v?'':' empty'); d.textContent = v? v.icon : ''; if(v){ d.title = v.name; d.addEventListener('click', ()=>equipFromBag(i)); } grid.appendChild(d); }
  }

  // equip & unequip
  function equipFromBag(i){ const it = state.bag[i]; if(!it) return; const old = state.equipped[it.slotKey]; if(old){ const idx = state.bag.findIndex(x=>x===null); if(idx===-1){ addLog('Çanta dolu','#ff3355'); return; } state.bag[idx]=old; } state.equipped[it.slotKey] = it; state.bag[i]=null; addLog(`✅ ${it.name} kuşanıldı`,'#00f5ff'); }
  function unequip(slotKey){ const it = state.equipped[slotKey]; if(!it) return; const idx = state.bag.findIndex(x=>x===null); if(idx===-1){ addLog('Çanta dolu','#ff3355'); return; } state.bag[idx]=it; state.equipped[slotKey]=null; addLog(`🔓 ${it.name} çıkarıldı`,'#c0d0ff'); }

  // open boxes (queue groups)
  function openBox(count=1){
    if(state.boxes < 1){ addLog('⚠️ Box yok!','#ff3355'); return; }
    const c = Math.min(state.boxes, count); state.boxes -= c; state.activeBoxGroups += c;
    addLog(`📦 ${c} box açıldı — kuyruğa eklendi (${state.activeBoxGroups})`,'#00f5ff');
    if(enemies.length===0) spawnGroupForCurrentBox();
  }

  // spawn next group for queued boxes
  function spawnGroupForCurrentBox(){ if(state.activeBoxGroups<=0) return; spawnGroupForCurrentBoxImpl(); }
  function spawnGroupForCurrentBoxImpl(){ spawnGroupForCurrentBox(); } // placeholder overwritten earlier (kept for clarity)

  // helper to ensure canvas resized before spawning
  function resizeIfNeeded(){ resize(); }

  // roll rarity
  function lootW(lvl){ if(lvl<5) return[90,10,0,0,0,0,0]; if(lvl<10) return[60,35,5,0,0,0,0]; if(lvl<20) return[35,45,18,2,0,0,0]; if(lvl<35) return[15,35,38,10,2,0,0]; if(lvl<55) return[5,18,42,24,9,2,0]; if(lvl<80) return[1,6,28,36,22,6,1]; return[0,1,10,22,35,24,8]; }
  function rollRar(lvl,boost=0){ const w=lootW(lvl).map((v,i)=>Math.max(0,v+(i>=2?boost:-boost/3))); const t=w.reduce((a,b)=>a+b,0); let r=Math.random()*t; for(let i=0;i<w.length;i++){ r-=w[i]; if(r<=0) return RARS[i]; } return 'bronze'; }

  // generateItem uses generateItem alias above
  function generateItem(){ return generateItem_impl(); }
  function generateItem_impl(){ return generateItem(); } // already defined above; keep compatibility

  // UI event bindings
  $('open-1').addEventListener('click', ()=> openBox(1));
  $('open-10').addEventListener('click', ()=> openBox(10));
  $('open-1-side').addEventListener('click', ()=> openBox(1));
  $('open-10-side').addEventListener('click', ()=> openBox(10));
  $('btn-eq').addEventListener('click', lootEquip);
  $('btn-sell').addEventListener('click', lootSell);
  $('btn-bag').addEventListener('click', lootBag);

  $('mkt-btn').addEventListener('click', ()=> addLog('Market açıldı (simülasyon).','#00f5ff'));

  // top-level actions
  function renderUI(){
    renderPanels();
    $('wb-wave').textContent = state.wave; $('wb-sub').textContent = state.subwave;
    $('h-gold').textContent = fmt(state.gold); $('h-gqt').textContent = fmt(state.gqt); $('h-lvl').textContent = state.charLvl;
  }

  function renderPanels(){ $('h-gold').textContent = fmt(state.gold); $('h-gqt').textContent = fmt(state.gqt); $('h-boxes').textContent = state.boxes; const el = $('equip-list'); el.innerHTML=''; Object.keys(SLOTS).forEach(k=>{ const s=SLOTS[k], it=state.equipped[k]; const row=document.createElement('div'); row.className='equip-slot'; row.innerHTML = `<div><div style="font-size:14px">${s.icon} ${s.label}</div><div style="color:var(--dim);font-size:12px">${it?it.name:'Boş'}</div></div>`; const btn=document.createElement('button'); btn.className='btn'; btn.textContent=it?'Çıkart':'—'; btn.addEventListener('click', ()=>{ if(it) unequip(k); }); row.appendChild(btn); el.appendChild(row); }); const grid=$('inv-grid'); grid.innerHTML=''; for(let i=0;i<20;i++){ const v=state.bag[i]; const d=document.createElement('div'); d.className='inv-slot'+(v?'':' empty'); d.textContent=v?v.icon:''; grid.appendChild(d); } }

  // initial setup and start loop
  resize(); load(); renderPanels(); spawnWave(); requestAnimationFrame(loop);

  // export API for debugging
  return { spawnWave, openBox, state };
})(); // GQ IIFE
</script>
</body>
