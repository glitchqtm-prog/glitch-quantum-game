<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GLITCH QUANTUM — V3 (fixed spawns + ship)</title>
<style>
/* (stiller kısa tutuldu; önceki V3 stillerinin korunduğunu varsayıyoruz) */
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#04050e;--border:#182050;--cyan:#00f5ff;--mag:#ff00aa;--gold:#ffd700;--text:#cfe;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#020417;color:var(--text);font-family:'Share Tech Mono',monospace;overflow:hidden}
#root{display:flex;flex-direction:column;height:100vh}
#header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border)}
#logo{font-family:Orbitron, sans-serif;color:var(--cyan);letter-spacing:2px}
#main{display:flex;flex:1}
#czone{flex:1;position:relative}
canvas{display:block;width:100%;height:100%}
#sidebar{width:300px;border-left:1px solid var(--border);background:#050616;color:var(--text);overflow:auto}
#clog{position:absolute;top:8px;left:8px;z-index:60}
.clog-line{font-size:11px;margin-bottom:4px}
#loot-pop{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#06101a;padding:16px;border-radius:10px;border:2px solid var(--mag);z-index:120;display:none}
.btn{padding:6px 10px;border-radius:6px;border:none;cursor:pointer}
.btn.cyan{background:var(--cyan);color:#001}
.btn.mag{background:var(--mag);color:#fff}
.modal-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:130}
</style>
</head>
<body>
<div id="root">
  <div id="header">
    <div id="logo">GLITCH <span style="color:var(--mag)">QUANTUM</span></div>
    <div>
      <button id="open-1" class="btn cyan">1 AÇ</button>
      <button id="open-10" class="btn cyan">10 AÇ</button>
      <span style="margin-left:12px" id="box-count">Box: 10</span>
    </div>
  </div>

  <div id="main">
    <div id="czone">
      <canvas id="gc"></canvas>
      <div id="clog"></div>
      <div id="loot-pop">
        <div id="lp-ic" style="font-size:36px">🔫</div>
        <div id="lp-rar" style="font-size:13px;margin-top:6px">RAR</div>
        <div id="lp-nm" style="font-size:14px;margin-top:8px">NAME</div>
        <div id="lp-st" style="margin-top:6px;color:#cfe"></div>
        <div style="display:flex;gap:8px;margin-top:12px;justify-content:center">
          <button id="lp-eq" class="btn cyan">Kuşan</button>
          <button id="lp-bag" class="btn">Çanta</button>
          <button id="lp-sell" class="btn mag">Sat</button>
        </div>
      </div>
      <div id="boss-modal" class="modal-overlay">
        <div style="background:#021028;padding:16px;border:1px solid #223; border-radius:10px;min-width:360px">
          <h3 id="boss-title">BOSS</h3>
          <div style="height:12px;background:#08101a;border-radius:6px;margin:8px 0"><div id="boss-hp" style="height:100%;width:100%;background:var(--mag);border-radius:6px"></div></div>
          <div style="text-align:center">
            <button id="boss-attack" class="btn cyan">Saldır</button>
            <button id="boss-retreat" class="btn">Geri</button>
          </div>
        </div>
      </div>
    </div>

    <div id="sidebar">
      <h3 style="padding:12px 10px;font-family:Orbitron">STAT & ENK</h3>
      <div style="padding:10px">GOLD: <span id="h-gold">0</span></div>
      <div style="padding:10px">GQT: <span id="h-gqt">50</span></div>
      <div style="padding:10px"><b>Yetenek</b></div>
      <div id="skill-tree" style="padding:10px"></div>
    </div>
  </div>
</div>

<script>
/* --- Updated V3 fixes: accurate spawn positions and improved ship drawing --- */
(() => {
'use strict';

/* Utilities */
const $ = id => document.getElementById(id);
const fmt = n => (n>=1e6?Math.round(n/1e6)+'M':n>=1e3?Math.round(n/1e3)+'K':n.toString());
const rnd = (a,b) => a + Math.random()*(b-a);

/* Game state (kept minimal for demonstration) */
const gs = {
  boxes: 10, gold: 0, gqt: 50,
  wave:1, subwave:1, activeBoxGroups:0,
  equipped:{weapon:null,hull:null,engine:null,shield:null,sensor:null,reactor:null,armor:null},
  bag:new Array(20).fill(null),
  autoOpen:false, autoEquip:false, autoSell:false,
  charLvl:1, skillsOwned:[]
};

/* Canvas */
let gc, gctx, sc, sctx, width, height, lastT = 0, shipPulse = 0;
let enemies = [], projs = [], pProjs = [], particles = [];
let lootPaused = false, pendingLoot = null;
let bossActive = false, specialBoss = null;

/* Enemy types */
const ENEMY_TYPES = [
  {name:'Anomali', col:'#ff3355', baseHp:28, baseDmg:4, xp:5, gold:6},
  {name:'Glitchör', col:'#ff00aa', baseHp:72, baseDmg:18, xp:24, gold:18},
  {name:'Voidar', col:'#aa44ff', baseHp:240, baseDmg:80, xp:90, gold:60},
  {name:'Nexus', col:'#ffd700', baseHp:1100, baseDmg:420, xp:400, gold:240}
];

/* Rarity colors */
const RCOL = { bronze:'#cd7f32', silver:'#c0c0c0', gold:'#ffd700', platinum:'#e5e4e2', diamond:'#a8f0ff', radianium:'#ff88ff', glitchanium:'#cc44ff' };

/* Setup canvas and sizes */
function initCanvas(){
  gc = $('gc');
  // Set canvas to fill its parent (#czone)
  const rect = gc.parentElement.getBoundingClientRect();
  width = Math.max(600, Math.floor(rect.width));
  height = Math.max(360, Math.floor(rect.height));
  gc.width = width; gc.height = height;
  gctx = gc.getContext('2d');
  // small scene canvas for ship preview not necessary here
  shipPulse = 0;
}
function updateCanvasSize(){ initCanvas(); }

/* Improved ship drawing (neon grid, dome cockpit, dual engines) */
function drawShip(ctx, cx, cy, pulse, scale=1){
  ctx.save(); ctx.translate(cx, cy); ctx.scale(scale, scale);
  // body base
  const body = '#1b2340';
  const accent = '#00f5ff';
  // glow ellipse
  const gr = ctx.createRadialGradient(0,0,4,0,0,46);
  gr.addColorStop(0, accent + '60'); gr.addColorStop(1, 'transparent');
  ctx.fillStyle = gr; ctx.beginPath(); ctx.ellipse(0,0,46,26,0,0,Math.PI*2); ctx.fill();
  // hull
  const bg = ctx.createLinearGradient(-30,-14,30,14);
  bg.addColorStop(0, body); bg.addColorStop(0.5, '#071a2a'); bg.addColorStop(1, body);
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(42,0);
  ctx.bezierCurveTo(36,-12,10,-20,-10,-18);
  ctx.lineTo(-28,-12); ctx.lineTo(-28,12); ctx.lineTo(-10,18);
  ctx.bezierCurveTo(10,20,36,12,42,0);
  ctx.closePath(); ctx.fill();
  // neon grid lines across hull
  ctx.strokeStyle = accent + '55'; ctx.lineWidth = 0.9;
  for(let gx=-18; gx<=28; gx+=8){
    ctx.beginPath(); ctx.moveTo(gx,-14); ctx.lineTo(gx,14); ctx.stroke();
  }
  for(let gy=-10; gy<=10; gy+=6){
    ctx.beginPath(); ctx.moveTo(-20,gy); ctx.lineTo(30,gy); ctx.stroke();
  }
  // cockpit dome
  const cg = ctx.createRadialGradient(8,-2,1,8,-2,10);
  cg.addColorStop(0, '#bff'); cg.addColorStop(0.5, accent+'cc'); cg.addColorStop(1, '#004a6b00');
  ctx.beginPath(); ctx.ellipse(8,-2,10,7,0,0,Math.PI*2); ctx.fillStyle = cg; ctx.fill();
  ctx.strokeStyle = accent+'66'; ctx.lineWidth=0.6; ctx.stroke();
  // top cannon
  ctx.fillStyle = '#07101a'; ctx.fillRect(12,-16,16,6); 
  const canG = ctx.createRadialGradient(34,-15,0,34,-15,5); canG.addColorStop(0, accent); canG.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(34,-15,4,0,Math.PI*2); ctx.fillStyle = canG; ctx.fill();
  // engines (dual) with red exhaust
  const eL = 18 + Math.sin(pulse)*6;
  [-10,10].forEach((ey, i)=>{
    const ex = -22;
    ctx.beginPath(); ctx.rect(ex, ey-6, 16, 12); ctx.fillStyle = '#2a1722'; ctx.fill();
    const eg = ctx.createLinearGradient(ex- eL, ey, ex, ey);
    eg.addColorStop(0, 'rgba(255,40,80,0)'); eg.addColorStop(0.5, '#ff224477'); eg.addColorStop(1, '#ff2244');
    ctx.beginPath(); ctx.moveTo(ex,ey-6); ctx.lineTo(ex - eL, ey); ctx.lineTo(ex,ey+6); ctx.closePath(); ctx.fillStyle = eg; ctx.fill();
  });
  // small running lights
  [[22,-6,'#00ff88'],[22,6,'#ff3355'],[-16,0,accent]].forEach(([lx,ly,lc])=>{
    ctx.beginPath(); ctx.arc(lx,ly,2,0,Math.PI*2); ctx.fillStyle = lc; ctx.shadowColor = lc; ctx.shadowBlur = 6; ctx.fill(); ctx.shadowBlur=0;
  });
  ctx.restore();
}

/* draw single enemy (slightly more detailed) */
function drawEnemy(ctx, e){
  ctx.save(); ctx.translate(e.x, e.y);
  const sz = e.isBoss ? 28 : 12;
  // hull shape
  ctx.beginPath();
  ctx.moveTo(sz,0); ctx.bezierCurveTo(sz-8,-sz/2,2,-sz, -sz/2, -sz/1.6);
  ctx.lineTo(-sz-4, -sz/2); ctx.lineTo(-sz-4, sz/2); ctx.lineTo(-sz/2, sz/1.6);
  ctx.bezierCurveTo(2,sz, sz-8, sz/2, sz,0);
  ctx.closePath();
  ctx.fillStyle = e.col; ctx.fill();
  ctx.strokeStyle = '#00000066'; ctx.lineWidth = 0.7; ctx.stroke();
  // cockpit glow
  ctx.beginPath(); ctx.ellipse(6,0,4,3,0,0,Math.PI*2); ctx.fillStyle = e.col+'aa'; ctx.fill();
  ctx.restore();
}

/* Create enemy object with proper spawn positions across screen */
function mkEnemy(wave, sub, shipLvl){
  const t = ENEMY_TYPES[Math.min(Math.floor((wave-1)/3), ENEMY_TYPES.length-1)];
  const scale = Math.pow(1.18, wave-1) * Math.pow(1.2, shipLvl-1) * (1 + (sub-1)*0.05);
  const hp = Math.ceil(t.baseHp * scale);
  const dmg = Math.ceil(t.baseDmg * Math.pow(1.12, wave-1));
  // spawn at right side offscreen, Y random between 20% and 80%
  const startX = width + 60 + Math.random()*140;
  const startY = Math.max(60, Math.min(height-60, Math.floor(height*0.2 + Math.random()*(height*0.6))));
  return {name: t.name, col: t.col, hp: hp, maxHp: hp, dmg: dmg, xp: t.xp, gold: t.gold, x: startX, y: startY, stopX: Math.floor(width*0.6), dead:false, isBoss:false, spd: 40 + Math.random()*40};
}

/* Spawn group logic: uses mkEnemy and positions them in visible area */
function spawnGroupForCurrentBox(){
  // ensure canvas size is up to date
  initCanvas();
  enemies = []; projs = []; pProjs = [];
  const wave = gs.wave, sub = gs.subwave;
  if(sub < 10){
    const cnt = 3 + Math.min(6, Math.floor(gs.wave*0.5) + sub);
    for(let i=0;i<cnt;i++){
      const e = mkEnemy(wave, sub, gs.charLvl);
      // spread Y positions to avoid top-left clump
      e.y = Math.floor(height*0.25 + (i*(height*0.5/cnt)) + Math.random()*24);
      e.x += i*28; // stagger X so they arrive slightly spread
      enemies.push(e);
    }
    addLog(`🌊 Dalga ${wave}-${sub} geldi (${cnt} düşman)`, '#ff88ff');
  } else {
    // boss spawn centered
    const bossHp = Math.ceil(500 * Math.pow(1.25, wave-1) * Math.pow(1.25, gs.charLvl-1));
    const bossDmg = Math.ceil(20 * Math.pow(1.18, wave-1));
    const boss = {name:`WAVE BOSS ${wave}`, col:'#ffd700', hp:bossHp, maxHp:bossHp, dmg:bossDmg, xp: Math.ceil(300*wave), gold: Math.ceil(200*wave), x: Math.floor(width*0.6), y: Math.floor(height*0.5), stopX: Math.floor(width*0.6), dead:false, isBoss:true};
    enemies.push(boss);
    addLog(`🔥 BOSS DALGA: ${boss.name}`, '#ffd700');
  }
}

/* Generate simple loot */
function generateItem(){
  const rarList = ['bronze','silver','gold','platinum'];
  const rar = rarList[Math.floor(Math.random()*rarList.length)];
  const slots = ['weapon','hull','engine','shield','reactor','sensor','armor'];
  const slot = slots[Math.floor(Math.random()*slots.length)];
  const sv = Math.round(10 + Math.random()*60);
  const sell = Math.round(sv*0.6);
  return {slotKey: slot, rar: rar, stars: Math.floor(Math.random()*4)+1, sv: sv, name: `${rar.toUpperCase()} ${slot}`, icon:'🔧', sellVal: sell, statKey: slot==='weapon'?'atk':'hp'};
}

/* Show loot popup and pause game */
function showLoot(item){
  pendingLoot = item;
  $('loot-pop').style.display = 'block';
  $('lp-ic').textContent = item.icon;
  $('lp-rar').textContent = item.rar.toUpperCase();
  $('lp-rar').style.color = RCOL[item.rar] || '#fff';
  $('lp-nm').textContent = item.name;
  $('lp-st').textContent = `+${item.sv} ${item.statKey.toUpperCase()}`;
  lootPaused = true;
  // auto-equip / auto-sell rules
  if(gs.autoEquip){
    const cur = gs.equipped[item.slotKey];
    const curVal = cur?cur.sv:0;
    if(item.sv > curVal){ setTimeout(()=> equipLoot(), 400); return; }
  }
  if(gs.autoSell){
    const cur = gs.equipped[item.slotKey];
    const curVal = cur?cur.sv:0;
    if(item.sv <= curVal){ setTimeout(()=> sellLoot(), 600); return; }
  }
}

/* Handle loot actions */
function equipLoot(){
  if(!pendingLoot) return;
  const item = pendingLoot;
  const old = gs.equipped[item.slotKey];
  if(old){
    const idx = gs.bag.findIndex(x=>x===null);
    if(idx!==-1) gs.bag[idx] = old;
  }
  gs.equipped[item.slotKey] = item;
  addLog(`✅ ${item.name} kuşanıldı`, RCOL[item.rar]);
  closeLoot();
  finishAfterLoot();
}
function bagLoot(){
  if(!pendingLoot) return;
  const idx = gs.bag.findIndex(x=>x===null);
  if(idx===-1) { addLog('Çanta dolu!', '#ff3355'); return; }
  gs.bag[idx] = pendingLoot;
  addLog(`🎒 ${pendingLoot.name} çantaya eklendi`, '#cfe');
  closeLoot(); finishAfterLoot();
}
function sellLoot(){
  if(!pendingLoot) return;
  gs.gold += pendingLoot.sellVal;
  addLog(`💰 Satıldı: +${pendingLoot.sellVal} Gold`, '#ffd700');
  closeLoot(); finishAfterLoot();
}
function closeLoot(){
  pendingLoot = null;
  $('loot-pop').style.display = 'none';
  lootPaused = false;
}

/* After loot handled, decrement group count and advance subwave/spawn if queued */
function finishAfterLoot(){
  gs.activeBoxGroups = Math.max(0, gs.activeBoxGroups - 1);
  // advance subwave
  if(gs.subwave < 10) gs.subwave++;
  else { gs.subwave = 1; gs.wave++; }
  if(gs.activeBoxGroups > 0){
    spawnGroupForCurrentBox();
  } else {
    addLog('⏸️ Grup tamamlandı. Yeni grup yok.', '#88a');
  }
  renderUI();
  save();
}

/* Open boxes (each open adds a queued group) */
function openBox(count=1){
  if(gs.boxes < 1){ addLog('⚠️ Box yok', '#ff3355'); return; }
  const openCount = Math.min(gs.boxes, count);
  gs.boxes -= openCount;
  gs.activeBoxGroups += openCount;
  addLog(`📦 ${openCount} box açıldı — ${gs.activeBoxGroups} grup kuyruğunda`, '#00f5ff');
  // If currently no active enemies, spawn immediately
  if(enemies.length === 0) spawnGroupForCurrentBox();
  renderUI();
  save();
}

/* Physics & update loop */
let aaTimer = 0;
function update(dt){
  shipPulse += dt*3;
  // auto open (not implemented toggle UI here; left for user)
  // update projectiles, particles
  // auto attack only when enemies exist and not lootPaused and not bossActive
  if(!lootPaused && !bossActive && enemies.length>0){
    aaTimer -= dt;
    const csSpd = 0.8 + 0.04*10; // simplified
    if(aaTimer <= 0){
      aaTimer = 1 / csSpd;
      // fire a proj to nearest enemy
      const tgt = enemies.filter(e=>!e.dead).sort((a,b)=>a.x-b.x)[0];
      if(tgt){
        const dx = tgt.x - 130, dy = tgt.y - (height*0.5);
        const dist = Math.hypot(dx,dy)||1;
        pProjs.push({x:130+20, y:height*0.5, vx:(dx/dist)*420, vy:(dy/dist)*420, dmg:Math.round(12 + Math.random()*6), life:1.5});
      }
    }
  }

  // projectiles movement & collisions
  for(let i=pProjs.length-1;i>=0;i--){
    const p = pProjs[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
    for(let j=0;j<enemies.length;j++){
      const e = enemies[j]; if(e.dead) continue;
      const dx = p.x - e.x, dy = p.y - e.y;
      if(Math.hypot(dx,dy) < 18){
        e.hp -= p.dmg; spawnDamage(e.x,e.y-6,p.dmg);
        pProjs.splice(i,1);
        if(e.hp <= 0 && !e.dead){
          e.dead = true; addLog(`💀 ${e.name} yok edildi! +${e.xp||0}XP +${e.gold||0}G`, e.col);
          gs.gold += e.gold || 0; gs.charLvl += 0; // minimal
        }
        break;
      }
    }
    if(p && (p.life <= 0 || p.x < -50 || p.x > width+50)) pProjs.splice(i,1);
  }

  // enemies movement
  enemies.forEach(e=>{
    if(e.dead) return;
    if(e.x > e.stopX) e.x -= (e.spd || 45) * dt;
    else {
      // shoot occasionally (not fully implemented)
      if(!lootPaused && Math.random() < dt*0.4){
        const dx = 130 - e.x, dy = height*0.5 - e.y; const dist = Math.hypot(dx,dy)||1;
        projs.push({x:e.x-10, y:e.y, vx:(dx/dist)*260, vy:(dy/dist)*260, dmg:e.dmg, life:1.4});
      }
    }
  });

  // enemy projectiles hitting player
  for(let i=projs.length-1;i>=0;i--){
    const p = projs[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
    if(Math.hypot(p.x - 130, p.y - height*0.5) < 20){
      const dmg = Math.max(1, p.dmg - 1);
      // apply to player hp (not tracked fully here)
      spawnDamage(130, height*0.5, dmg);
      projs.splice(i,1);
    }
    if(p && (p.life <= 0 || p.x < -50 || p.x > width+50)) projs.splice(i,1);
  }

  // check clear groups
  if(!lootPaused && enemies.length > 0 && enemies.every(x=>x.dead)){
    // handle drop or advance
    if(gs.activeBoxGroups > 0){
      // random drop chance
      if(Math.random() < 0.35){
        const item = generateItem();
        showLoot(item);
      } else {
        // no drop -> decrement and advance
        gs.activeBoxGroups = Math.max(0, gs.activeBoxGroups - 1);
        // next subwave
        if(gs.subwave < 10) gs.subwave++; else { gs.subwave = 1; gs.wave++; }
        if(gs.activeBoxGroups > 0) spawnGroupForCurrentBox();
      }
    } else {
      enemies = [];
    }
  }
}

/* spawn damage particle */
function spawnDamage(x,y,txt){
  particles.push({x,y,txt: typeof txt === 'number'?txt.toString(): (txt||'✦'), life:1.2});
}

/* render everything */
function render(){
  // clear
  gctx.clearRect(0,0,width,height);
  // background
  const g = gctx.createLinearGradient(0,0,0,height); g.addColorStop(0,'#010517'); g.addColorStop(1,'#02102a');
  gctx.fillStyle = g; gctx.fillRect(0,0,width,height);
  // stars
  for(let i=0;i<60;i++){ gctx.fillStyle='rgba(255,255,255,0.03)'; gctx.fillRect((i*47+(shipPulse*6))%width,(i*37)%height,2,2); }
  // draw player ship at left center
  drawShip(gctx, 130, height*0.5, shipPulse, 1.0);
  // draw enemies
  enemies.forEach(e=>{ if(!e.dead) drawEnemy(gctx,e); });
  // projectiles: player
  pProjs.forEach(p=>{ gctx.fillStyle='#00f5ff'; gctx.beginPath(); gctx.arc(p.x,p.y,3,0,Math.PI*2); gctx.fill(); });
  // projectiles: enemies
  projs.forEach(p=>{ gctx.fillStyle='#ff4444'; gctx.beginPath(); gctx.arc(p.x,p.y,3,0,Math.PI*2); gctx.fill(); });
  // particles
  particles.forEach((pp,i)=>{ gctx.fillStyle='#fff'; gctx.globalAlpha = Math.max(0, pp.life); gctx.fillText(pp.txt, pp.x, pp.y); pp.life -= 0.01; if(pp.life <= 0) particles.splice(i,1); gctx.globalAlpha = 1; });
}

/* main loop */
function loop(ts){
  if(!lastT) lastT = ts;
  const dt = Math.min((ts-lastT)/1000, 0.05);
  lastT = ts;
  update(dt);
  render();
  renderUI();
  requestAnimationFrame(loop);
}

/* UI updates and helpers */
function renderUI(){
  $('box-count').textContent = `Box: ${gs.boxes}`;
  // display enemies debug on left for quick check (optional)
  const clog = $('clog'); clog.innerHTML = '';
  enemies.forEach(e => {
    const d = document.createElement('div'); d.className = 'clog-line'; d.textContent = `${e.name} @${Math.round(e.x)},${Math.round(e.y)} ${e.dead?'(dead)':''}`; clog.appendChild(d);
  });
}

/* Persistence */
function save(){ try{ localStorage.setItem('gq_v3_fix', btoa(JSON.stringify(gs))); }catch(e){} }
function load(){ try{ const d = localStorage.getItem('gq_v3_fix'); if(d) Object.assign(gs, JSON.parse(atob(d))); }catch(e){} }

/* event bindings */
$('open-1').addEventListener('click', ()=> openBox(1));
$('open-10').addEventListener('click', ()=> openBox(10));
$('lp-eq').addEventListener('click', equipLoot);
$('lp-bag').addEventListener('click', bagLoot);
$('lp-sell').addEventListener('click', sellLoot);

/* init */
function init(){
  load(); initCanvas(); spawnGroupForCurrentBox = spawnGroupForCurrentBox; // no-op keep reference
  // ensure initial UI
  renderUI();
  // resize listener
