<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşkımızın Kartları</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Arka plan yazısı */
        .bg-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8vw;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.4);
            white-space: nowrap;
            z-index: 1;
            pointer-events: none;
            text-align: center;
        }

        .game-container {
            position: relative;
            z-index: 2;
            display: flex;
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 20px;
            gap: 20px;
        }

        /* Sol Alan: Kart Boşlukları ve Deste */
        .board {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .slots {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .slot {
            width: 140px;
            height: 220px;
            border: 3px dashed rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.5s ease;
        }

        .deck-container {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 140px;
            height: 220px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .deck-container:hover {
            transform: scale(1.05);
        }

        .card-back {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #2c3e50, #3498db);
            border: 4px solid #fff;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.3);
            position: absolute;
            backface-visibility: hidden;
        }

        .card-back::after {
            content: "🌌";
        }

        /* Çekilen Kartların Tasarımı */
        .drawn-card {
            width: 140px;
            height: 220px;
            background: white;
            border: 4px solid #ffd700;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: popIn 0.5s ease forwards;
            text-align: center;
            padding: 10px;
        }

        .drawn-card .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .drawn-card .title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        @keyframes popIn {
            0% { transform: scale(0) translateY(100px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Sağ Alan: WhatsApp Sohbet */
        .chat-container {
            flex: 1;
            background: #e5ddd5;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            0% { transform: translateX(50px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .chat-info h3 {
            font-size: 16px;
            margin-bottom: 2px;
        }

        .typing-indicator {
            font-size: 12px;
            color: #d1d1d1;
            font-style: italic;
            display: none;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: cover;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .message {
            background: #fff;
            padding: 12px 15px;
            border-radius: 0 15px 15px 15px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: none;
            position: relative;
        }

        .chat-footer {
            background: #f0f0f0;
            padding: 15px;
            text-align: center;
        }

        .reset-btn {
            background: #128C7E;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .reset-btn:hover {
            background: #075e54;
        }

        /* Destenin altındaki sahte kart efekti */
        .deck-shadow1, .deck-shadow2 {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #2c3e50, #3498db);
            border: 4px solid #fff;
            border-radius: 15px;
            bottom: -5px;
            right: -5px;
            z-index: -1;
        }
        .deck-shadow2 {
            bottom: -10px;
            right: -10px;
            z-index: -2;
        }

        /* Uyarı yazısı */
        .instruction {
            text-align: center;
            margin-top: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="bg-text">KÜBRA ❤️‍🔥 ÜMİT</div>

    <div class="game-container">
        <div class="board">
            <div class="slots">
                <div class="slot" id="slot0"></div>
                <div class="slot" id="slot1"></div>
                <div class="slot" id="slot2"></div>
            </div>
            <div class="instruction" id="instructionText">Aşkımızın destesine tıkla ve 3 kart seç hayatım...</div>
            <div class="deck-container" id="deck" onclick="drawCard()">
                <div class="card-back"></div>
                <div class="deck-shadow1"></div>
                <div class="deck-shadow2"></div>
            </div>
        </div>

        <div class="chat-container" id="chat">
            <div class="chat-header">
                <div class="avatar">👩🏻‍❤️‍👨🏻</div>
                <div class="chat-info">
                    <h3>KübrAŞKIMTAŞ</h3>
                    <div class="typing-indicator" id="typing">yazıyor...</div>
                </div>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="message" id="finalMessage"></div>
            </div>
            <div class="chat-footer">
                <button class="reset-btn" onclick="resetGame()">Yeniden Kart Çek</button>
            </div>
        </div>
    </div>

    <script>
        // En az 10 kartlık deste tanımlaması
        const deck = [
            { id: 1, title: "Aşk", icon: "❤️", meaning: "tarifsiz bir bağla birbirimize kenetlendiğimizi" },
            { id: 2, title: "Sadakat", icon: "💍", meaning: "gözümüzün birbirinden başkasını görmeyeceğini" },
            { id: 3, title: "Güneş", icon: "☀️", meaning: "ilişkimizin her zaman sımsıcak ve aydınlık kalacağını" },
            { id: 4, title: "Gelecek", icon: "🔮", meaning: "birlikte yaşlanacağımız harika yılların bizi beklediğini" },
            { id: 5, title: "Tutku", icon: "🔥", meaning: "aradaki çekimin hiçbir zaman sönmeyeceğini" },
            { id: 6, title: "Huzur", icon: "🕊️", meaning: "kollarımda her zaman güvende ve huzurlu olacağını" },
            { id: 7, title: "Sonsuzluk", icon: "♾️", meaning: "bu aşkın bir ömür boyu, sonsuza dek süreceğini" },
            { id: 8, title: "Yıldız", icon: "⭐", meaning: "dileklerimizin ve hayallerimizin bir bir gerçek olacağını" },
            { id: 9, title: "Şans", icon: "🍀", meaning: "hayatımdaki en büyük şansımın sen olduğunu" },
            { id: 10, title: "Kader", icon: "🌌", meaning: "yollarımızın ilahi bir şekilde sonsuza dek birleştiğini" },
            { id: 11, title: "Neşe", icon: "🎭", meaning: "birlikte her zaman çocuk gibi eğlenip güleceğimizi" },
            { id: 12, title: "Ev", icon: "🏡", meaning: "yakında sıcacık yuvamızı kuracağımızı" }
        ];

        // Olumlu bitiş cümleleri (Rastgele seçilecek)
        const endings = [
            "Şunu asla unutma: Ümit seni çok seviyor.",
            "Zaten bunu kartlara sormaya gerek yok, Ümit sana sırılsıklam aşık.",
            "Kısacası bu kartlar diyor ki: Ümit kocan olacak!",
            "Her şey çok net bebeğim, Ümit seni çok seviyor ve Ümit kocan olacak.",
            "Tüm evrenin ortak mesajı şu: Ümit sana aşık ve hep seninle kalacak."
        ];

        let drawnCards = [];
        let availableCards = [...deck];
        let canDraw = true;

        function drawCard() {
            if (drawnCards.length >= 3 || !canDraw) return;

            // Rastgele kart seç
            const randomIndex = Math.floor(Math.random() * availableCards.length);
            const card = availableCards[randomIndex];
            
            // Seçilen kartı desteden çıkar
            availableCards.splice(randomIndex, 1);
            drawnCards.push(card);

            // Kartı ekranda göster
            const slotIndex = drawnCards.length - 1;
            const slot = document.getElementById(`slot${slotIndex}`);
            
            slot.innerHTML = `
                <div class="drawn-card">
                    <div class="icon">${card.icon}</div>
                    <div class="title">${card.title}</div>
                </div>
            `;
            slot.style.border = "none";
            slot.style.background = "transparent";

            // Eğer 3 kart çekildiyse sohbeti başlat
            if (drawnCards.length === 3) {
                canDraw = false;
                document.getElementById('deck').style.opacity = '0.5';
                document.getElementById('deck').style.cursor = 'not-allowed';
                document.getElementById('instructionText').innerText = "Kartların okunuyor bebeğim...";
                
                setTimeout(startChatProcess, 1000);
            }
        }

        function startChatProcess() {
            // Sohbet ekranını aç
            const chatContainer = document.getElementById('chat');
            chatContainer.style.display = 'flex';
            
            // "yazıyor..." efektini başlat
            const typingIndicator = document.getElementById('typing');
            typingIndicator.style.display = 'block';

            // 5 Saniye bekle ve mesajı gönder
            setTimeout(() => {
                typingIndicator.style.display = 'none';
                generateAndShowMessage();
            }, 5000);
        }

        function generateAndShowMessage() {
            const messageElement = document.getElementById('finalMessage');
            
            // Anlamlı ve 2-3 cümlelik bir paragraf oluşturma
            const card1 = drawnCards[0];
            const card2 = drawnCards[1];
            const card3 = drawnCards[2];
            
            const randomEnding = endings[Math.floor(Math.random() * endings.length)];

            const finalText = `Aşkım çektiğin ${card1.title}, ${card2.title} ve ${card3.title} kartları yan yana geldiğinde harika bir anlama çıkıyor. Bu harika kombinasyon bize; ${card1.meaning}, ${card2.meaning} ve ${card3.meaning} fısıldıyor. ${randomEnding} ❤️`;

            messageElement.innerText = finalText;
            messageElement.style.display = 'inline-block';
            document.getElementById('instructionText').innerText = "Mesajın geldi!";
        }

        function resetGame() {
            // Oyun verilerini sıfırla
            drawnCards = [];
            availableCards = [...deck];
            canDraw = true;

            // Görselleri sıfırla
            for (let i = 0; i < 3; i++) {
                const slot = document.getElementById(`slot${i}`);
                slot.innerHTML = '';
                slot.style.border = "3px dashed rgba(255, 255, 255, 0.6)";
                slot.style.background = "rgba(255, 255, 255, 0.1)";
            }

            document.getElementById('deck').style.opacity = '1';
            document.getElementById('deck').style.cursor = 'pointer';
            document.getElementById('instructionText').innerText = "Aşkımızın destesine tıkla ve 3 kart seç hayatım...";
            
            // Sohbeti gizle
            document.getElementById('chat').style.display = 'none';
            document.getElementById('finalMessage').style.display = 'none';
            document.getElementById('finalMessage').innerText = '';
        }
    </script>
</body>
</html>
