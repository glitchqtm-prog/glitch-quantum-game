<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>GLITCH QUANTUM — Fixed single file</title>
<style>
/* Core layout & styles (compact) */
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{
  --bg:#020418;--panel:#03061a;--border:#182050;
  --cyan:#00f5ff;--mag:#ff00aa;--gold:#ffd700;--tx:#cfe;--dim:#6f7aa0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--tx);overflow:hidden}
#root{display:flex;flex-direction:column;height:100vh}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border);background:#02041a}
#logo{font-family:Orbitron,sans-serif;color:var(--cyan);letter-spacing:2px}
.controls{display:flex;gap:10px;align-items:center}
.btn{font-family:'Share Tech Mono',monospace;padding:6px 10px;border-radius:6px;border:none;cursor:pointer}
.btn.cyan{background:var(--cyan);color:#021}
.btn.mag{background:var(--mag);color:#fff}
#main{display:flex;flex:1;min-height:0}
#czone{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#sidebar{width:320px;border-left:1px solid var(--border);background:#050616;padding:10px;overflow:auto}
.slabel{color:var(--dim);font-size:12px;margin:8px 0 6px}
#clog{position:absolute;top:8px;left:8px;z-index:60;pointer-events:none}
.clog-line{font-size:11px;margin-bottom:6px}
#loot-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:140;display:none}
#loot-pop{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:150;display:none;
  background:#06101a;border:2px solid var(--mag);padding:16px;border-radius:10px;min-width:260px;text-align:center}
#upg-bar{position:absolute;bottom:86px;left:50%;transform:translateX(-50%);display:none;background:#07101d;border:1px solid var(--cyan);padding:6px 12px;border-radius:20px;z-index:80}
#wave-badge{position:absolute;top:8px;right:8px;background:#07101d;border:1px solid var(--mag);padding:6px 10px;border-radius:6px;z-index:80;color:var(--mag)}
.modal-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:200}
.modal-box{background:#021028;padding:16px;border-radius:8px;border:1px solid #223;color:var(--tx);min-width:320px}
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.inv-slot{background:#051025;border-radius:6px;height:58px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);font-size:18px;cursor:pointer}
.inv-slot.empty{opacity:0.25}
.equip-slot{display:flex;align-items:center;justify-content:space-between;padding:8px;background:#071028;border-radius:6px;border:1px solid var(--border);margin-bottom:8px}
@media (max-width:900px){#sidebar{width:300px}}
</style>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div id="logo">GLITCH <span style="color:var(--mag)">QUANTUM</span></div>
    <div class="controls">
      <button class="btn cyan" id="open-1">1 AÇ</button>
      <button class="btn cyan" id="open-10">10 AÇ</button>
      <div style="margin-left:8px;color:var(--dim)">Box: <span id="box-count">0</span></div>
      <label style="margin-left:12px;color:var(--dim)"><input id="auto-open" type="checkbox" /> Auto Open</label>
      <label style="color:var(--dim)"><input id="auto-equip" type="checkbox" /> AutoEquip+</label>
      <label style="color:var(--dim)"><input id="auto-sell" type="checkbox" /> AutoSell</label>
    </div>
  </div>

  <div id="main">
    <div id="czone">
      <canvas id="gc"></canvas>
      <div id="clog"></div>
      <div id="wave-badge">WAVE <span id="wb-wave">1</span>-<span id="wb-sub">1</span></div>
      <div id="upg-bar">⚙️ <span id="ub-txt">Gemi Yükseltiliyor</span></div>

      <div id="loot-overlay"></div>
      <div id="loot-pop">
        <div class="lp-ic" id="lp-ic">🔫</div>
        <div class="lp-rar" id="lp-rar">BRONZ</div>
        <div class="lp-nm" id="lp-nm">BRONZ Gövde</div>
        <div id="lp-st" style="margin-top:6px;color:var(--tx)">+15 HP</div>
        <div style="display:flex;gap:8px;margin-top:12px;justify-content:center">
          <button class="btn cyan" id="lp-eq">KUŞAN</button>
          <button class="btn" id="lp-bag">ÇANTA</button>
          <button class="btn mag" id="lp-sell">SAT</button>
        </div>
      </div>

      <div id="boss-modal" class="modal-overlay">
        <div class="modal-box">
          <h3 id="boss-title">BOSS</h3>
          <div style="height:12px;background:#081018;border-radius:6px;margin:8px 0">
            <div id="boss-hp-bar" style="height:100%;width:100%;background:var(--mag);border-radius:6px"></div>
          </div>
          <div id="boss-log" style="height:120px;overflow:auto;background:#02031a;padding:8px;border-radius:6px;margin-bottom:8px"></div>
          <div style="display:flex;gap:8px;justify-content:center">
            <button class="btn cyan" id="boss-attack">⚔️ SALDIR</button>
            <button class="btn" id="boss-retreat">🚪 GERİ ÇEKİL</button>
          </div>
        </div>
      </div>

    </div><!-- /czone -->

    <div id="sidebar">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><strong style="font-family:Orbitron">STAT & ENK</strong></div>
        <div style="font-size:13px;color:var(--dim)">LVL <span id="h-lvl">1</span></div>
      </div>
      <div style="margin-top:8px">GOLD: <b id="h-gold">0</b></div>
      <div>GQT: <b id="h-gqt">50</b></div>

      <div class="slabel">Yetenek Ağacı</div>
      <div id="skill-tree"></div>

      <div class="slabel">Gemi Ekipmanları</div>
      <div id="equip-list"></div>

      <div class="slabel">Çanta (20)</div>
      <div id="inv-grid" class="inv-grid"></div>

      <div class="slabel">KUTU</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn cyan" id="open-1-side">1 AÇ</button>
        <button class="btn cyan" id="open-10-side">10 AÇ</button>
      </div>

      <div style="height:40px"></div>
    </div><!-- /sidebar -->
  </div><!-- /main -->
</div><!-- /root -->

<script>
/* Single-file game engine — corrected scoping and variables */

(() => {
  'use strict';

  // Short helpers
  const $ = id => document.getElementById(id);
  const fmt = n => (n>=1e9?Math.round(n/1e9)+'B':n>=1e6?Math.round(n/1e6)+'M':n>=1e3?Math.round(n/1e3)+'K':Math.floor(n));
  const rnd = (a,b)=> a + Math.random()*(b-a);
  const clamp = (v,a,b)=> Math.max(a,Math.min(b,v));

  // Constants
  const RCOL = { bronze:'#cd7f32', silver:'#c0c0c0', gold:'#ffd700', platinum:'#e5e4e2', diamond:'#a8f0ff', radianium:'#ff88ff', glitchanium:'#cc44ff' };
  const SLOTS = {
    weapon:{label:'Lazer',icon:'🔫',statKey:'atk'},
    hull:{label:'Gövde',icon:'🛡️',statKey:'hp'},
    engine:{label:'Motor',icon:'⚙️',statKey:'spd'},
    shield:{label:'Kalkan',icon:'🔵',statKey:'def'},
    reactor:{label:'Reaktör',icon:'⚡',statKey:'gqt_max'},
    sensor:{label:'Sensör',icon:'📡',statKey:'crit'},
    armor:{label:'Zırh',icon:'🔩',statKey:'def'}
  };
  const ENEMY_TYPES = [
    {name:'Anomali', col:'#ff3355', baseHp:24, baseDmg:4, xp:6, gold:4},
    {name:'Glitchör', col:'#ff00aa', baseHp:72, baseDmg:18, xp:24, gold:18},
    {name:'Voidar', col:'#aa44ff', baseHp:240, baseDmg:70, xp:90, gold:60},
    {name:'Nexus', col:'#ffd700', baseHp:1100, baseDmg:450, xp:420, gold:240}
  ];

  // Central state object (single scope)
  const state = {
    // character & ship
    charLvl:1, charXp:0, charXpNext:100,
    shipLvl:1, essence:0, essenceMax:100,
    hp:100, maxHp:100, gqtEnergy:0, maxGqtEnergy:100,
    stats:{str:10,agi:10,int:10,lck:5},
    gold:0, gqt:50, boxes:10,
    // waves
    wave:1, subwave:1, activeBoxGroups:0,
    // inventory
    equipped:{weapon:null,hull:null,engine:null,shield:null,reactor:null,sensor:null,armor:null},
    bag:new Array(20).fill(null),
    // autos
    autoOpen:false, autoEquip:false, autoSell:false, autoSellBag:false,
    // gameplay
    skillsOwned:[],
    bossDefeated:[],
    // modal state
    activeSpecialBoss: null // IMPORTANT: accessible everywhere
  };

  // Save/load
  const SKEY = 'gq_combined_v1';
  function save(){ try{ localStorage.setItem(SKEY, btoa(JSON.stringify(state))); }catch(e){} }
  function load(){ try{ const d = localStorage.getItem(SKEY); if(d) Object.assign(state, JSON.parse(atob(d))); }catch(e){} }

  // Canvas + lists
  const canvas = $('gc');
  const ctx = canvas.getContext('2d');
  let W=800, H=500, lastT=0, shipPulse=0, playerY=250;
  let enemies = [], projs = [], pProjs = [], particles = [];
  load();

  // Resize canvas to container
  function resizeCanvas(){
    const rect = canvas.parentElement.getBoundingClientRect();
    W = Math.max(600, Math.floor(rect.width));
    H = Math.max(360, Math.floor(rect.height));
    canvas.width = W; canvas.height = H;
    playerY = H * 0.5;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Drawing helpers
  function drawShip(ctx,x,y,pulse,scale=1){
    ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
    const equip = state.equipped;
    const hull = equip.hull, weapon = equip.weapon, shield = equip.shield;
    const hullCol = hull? (RCOL[hull.rar] || '#1b2b48') : '#1b2b48';
    const accent = weapon? (RCOL[weapon.rar] || '#00f5ff') : '#00f5ff';
    const glow = shield? (RCOL[shield.rar] || '#00f5ff') : '#00f5ff';
    // glow
    const gr = ctx.createRadialGradient(0,0,4,0,0,48); gr.addColorStop(0, glow+'44'); gr.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.ellipse(0,0,46,28,0,0,Math.PI*2); ctx.fillStyle = gr; ctx.fill();
    // hull
    const bg = ctx.createLinearGradient(-30,-14,30,14);
    bg.addColorStop(0,hullCol); bg.addColorStop(.4,accent+'12'); bg.addColorStop(1,hullCol);
    ctx.beginPath();
    ctx.moveTo(40,0); ctx.bezierCurveTo(36,-12,12,-20,-6,-18); ctx.lineTo(-24,-12); ctx.lineTo(-24,12); ctx.lineTo(-6,16);
    ctx.bezierCurveTo(12,18,36,10,40,0); ctx.closePath();
    ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = accent+'66'; ctx.lineWidth = 0.7; ctx.stroke();
    // grid
    ctx.strokeStyle = accent+'55'; ctx.lineWidth = 0.7;
    for(let gx=-16; gx<=24; gx+=8){ ctx.beginPath(); ctx.moveTo(gx,-12); ctx.lineTo(gx,12); ctx.stroke(); }
    for(let gy=-8; gy<=8; gy+=4){ ctx.beginPath(); ctx.moveTo(-18,gy); ctx.lineTo(28,gy); ctx.stroke(); }
    // cockpit
    const ck = ctx.createRadialGradient(8,-1,1,8,-1,9); ck.addColorStop(0, '#aaffff'); ck.addColorStop(.45, accent+'cc'); ck.addColorStop(1, '#004a6b00');
    ctx.beginPath(); ctx.ellipse(8,-1,9.5,7,0,0,Math.PI*2); ctx.fillStyle = ck; ctx.fill(); ctx.strokeStyle = accent+'99'; ctx.lineWidth=.9; ctx.stroke();
    // weapon tip
    ctx.fillStyle = '#07101a'; ctx.fillRect(12,-16,14,5); const canG = ctx.createRadialGradient(32,-16,0,32,-16,4); canG.addColorStop(0,accent); canG.addColorStop(1,'transparent'); ctx.beginPath(); ctx.arc(32,-16,3,0,Math.PI*2); ctx.fillStyle = canG; ctx.fill();
    // engines
    const eL = 18 + Math.sin(pulse)*6;
    [-12,12].forEach((ey,i)=>{
      const ex = -22;
      const pg = ctx.createLinearGradient(ex,ey-5,ex,ey+5); pg.addColorStop(0,'#2a1822'); pg.addColorStop(1,'#0b0510');
      ctx.fillStyle = pg; ctx.beginPath(); ctx.rect(ex,ey-5,16,10); ctx.fill();
      const eg = ctx.createLinearGradient(ex-eL,ey,ex,ey); eg.addColorStop(0,'rgba(255,80,80,0)'); eg.addColorStop(.5,'rgba(255,40,60,.45)'); eg.addColorStop(1,'rgba(255,20,40,.65)');
      ctx.beginPath(); ctx.moveTo(ex,ey-6); ctx.lineTo(ex - eL, ey); ctx.lineTo(ex,ey+6); ctx.closePath(); ctx.fillStyle = eg; ctx.fill();
    });
    // lights
    [[22,-3,'#00ff88'],[22,3,'#ff3355'],[-18,-11,accent]].forEach(([lx,ly,lc])=>{
      ctx.beginPath(); ctx.arc(lx,ly,1.8,0,Math.PI*2); ctx.fillStyle = lc; ctx.shadowColor = lc; ctx.shadowBlur = 6 + Math.sin(pulse)*2; ctx.fill(); ctx.shadowBlur = 0;
    });
    ctx.restore();
  }

  function drawEnemy(e){
    const ctx2 = ctx;
    ctx2.save(); ctx2.translate(e.x,e.y);
    const s = e.isBoss? 40 : 14;
    ctx2.beginPath();
    ctx2.moveTo(s,0); ctx2.bezierCurveTo(s-6,-s/2,2,-s,-s/2,-s/1.6);
    ctx2.lineTo(-s-4,-s/2); ctx2.lineTo(-s-4,s/2); ctx2.lineTo(-s/2,s/1.6);
    ctx2.bezierCurveTo(2,s,s-6,s/2,s,0);
    ctx2.closePath(); ctx2.fillStyle = e.col; ctx2.fill(); ctx2.strokeStyle='#00000066'; ctx2.lineWidth=.6; ctx2.stroke();
    ctx2.beginPath(); ctx2.ellipse(5,0,3.5,2.5,0,0,Math.PI*2); ctx2.fillStyle = e.col+'cc'; ctx2.fill();
    ctx2.restore();
  }

  function spawnFloatingText(x,y,txt,col='#fff'){ particles.push({x,y,txt:txt.toString(),col,life:1.2}); }

  // Enemy factory: spawn with good X and Y (right side, Y within 20%-80%)
  function mkEnemy(wave, sub){
    const typeIndex = Math.min(Math.floor((wave-1)/3), ENEMY_TYPES.length-1);
    const t = ENEMY_TYPES[typeIndex];
    const scale = Math.pow(1.18, wave-1) * (1 + (sub-1)*0.05);
    const hp = Math.ceil(t.baseHp * scale);
    const dmg = Math.ceil(t.baseDmg * Math.pow(1.12, wave-1));
    const startX = W + 80 + Math.random()*140;
    const startY = Math.floor(H*0.2 + Math.random()*H*0.6);
    return {name: t.name, col: t.col, hp, maxHp:hp, dmg, xp:t.xp, gold:t.gold, x:startX, y:startY, stopX:Math.floor(W*0.65), dead:false, isBoss:false, spd:40 + Math.random()*60};
  }

  // Spawn group for current box (subwave player)
  function spawnGroupForCurrentBox(){
    resizeIfNeeded();
    enemies.length = 0; projs.length = 0; pProjs.length = 0;
    const wave = state.wave, sub = state.subwave;
    if(sub < 10){
      const cnt = 3 + Math.min(10, Math.floor(state.wave*0.4) + sub);
      for(let i=0;i<cnt;i++){
        const e = mkEnemy(wave, sub);
        e.x += i*18; e.y = Math.max(80, Math.min(H-80, Math.floor(H*0.25 + (i*(H*0.5/cnt)) + Math.random()*24)));
        enemies.push(e);
      }
      addLog(`🌊 Dalga ${wave}-${sub} geldi (${cnt})`, '#ff88ff');
    } else {
      // boss
      const bossHp = Math.ceil(500 * Math.pow(1.25, wave-1) * Math.pow(1.2, state.shipLvl-1));
      const bossDmg = Math.ceil(20 * Math.pow(1.12, wave-1));
      const boss = {name:`WAVE BOSS ${wave}`, col:'#ffd700', hp:bossHp, maxHp:bossHp, dmg:bossDmg, xp:Math.ceil(300*wave), gold:Math.ceil(200*wave), x:Math.floor(W*0.6), y:Math.floor(H*0.5), stopX:Math.floor(W*0.6), dead:false, isBoss:true, spd:20};
      enemies.push(boss);
      addLog(`🔥 BOSS DALGA: ${boss.name}`, '#ffd700');
    }
    renderUI();
  }

  // Item generation & loot popup
  function generateItem(){
    const rarRoll = Math.random();
    const rar = rarRoll < 0.6 ? 'bronze' : rarRoll < 0.85 ? 'silver' : rarRoll < 0.95 ? 'gold' : 'platinum';
    const slots = Object.keys(SLOTS);
    const slotKey = slots[Math.floor(Math.random()*slots.length)];
    const sv = Math.round(12 + Math.random()*66);
    const sellVal = Math.max(5, Math.round((sv/2) + (['bronze','silver','gold','platinum'].indexOf(rar)*12)));
    return {slotKey, rar, stars: Math.floor(Math.random()*4)+1, sv, name:`${rar.toUpperCase()} ${SLOTS[slotKey].label}`, icon:SLOTS[slotKey].icon, sellVal, statKey:SLOTS[slotKey].statKey};
  }

  function showLoot(item){
    state.pendingLoot = item; // store it for autos if needed
    $('loot-overlay').style.display = 'block';
    $('loot-pop').style.display = 'block';
    $('lp-ic').textContent = item.icon; $('lp-rar').textContent = item.rar.toUpperCase(); $('lp-rar').style.color = RCOL[item.rar] || '#fff';
    $('lp-nm').textContent = item.name + ' ' + '★'.repeat(item.stars); $('lp-st').textContent = `+${item.sv} ${item.statKey.toUpperCase()}`;
    // pause game actions
    state.lootPaused = true;
    // auto behaviors
    if(state.autoEquip){
      const cur = state.equipped[item.slotKey]; const curVal = cur?cur.sv:0;
      if(item.sv > curVal){ setTimeout(()=> equipLoot(), 350); return; }
    }
    if(state.autoSell){
      const cur = state.equipped[item.slotKey]; const curVal = cur?cur.sv:0;
      if(item.sv <= curVal){ setTimeout(()=> sellLoot(), 700); return; }
    }
  }

  function closeLoot(){
    state.pendingLoot = null; $('loot-overlay').style.display = 'none'; $('loot-pop').style.display = 'none'; state.lootPaused = false;
  }
  function equipLoot(){
    const item = state.pendingLoot; if(!item) return;
    const old = state.equipped[item.slotKey];
    if(old){ const idx = state.bag.findIndex(x=>x===null); if(idx!==-1) state.bag[idx] = old; }
    state.equipped[item.slotKey] = item;
    addLog(`✅ ${item.name} kuşanıldı`, RCOL[item.rar]);
    closeLoot(); finishAfterLoot();
    save(); renderPanels();
  }
  function bagLoot(){ const idx = state.bag.findIndex(x=>x===null); if(idx===-1){ addLog('Çanta dolu!','#ff3355'); return; } state.bag[idx] = state.pendingLoot; addLog(`🎒 ${state.pendingLoot.name} çantaya eklendi`,'#cfe'); closeLoot(); finishAfterLoot(); save(); renderPanels(); }
  function sellLoot(){ state.gold += state.pendingLoot.sellVal; addLog(`💰 Satıldı: +${state.pendingLoot.sellVal} Gold`,'#ffd700'); closeLoot(); finishAfterLoot(); save(); renderPanels(); }

  function finishAfterLoot(){
    state.activeBoxGroups = Math.max(0, state.activeBoxGroups - 1);
    if(state.subwave < 10) state.subwave++; else { state.subwave = 1; state.wave++; }
    if(state.activeBoxGroups > 0) spawnGroupForCurrentBox();
    else addLog('⏸️ Grup tamamlandı, sıra bitti', '#88a');
    renderUI();
  }

  function openBox(count=1){
    if(state.boxes < 1){ addLog('⚠️ Kutunuz yok','#ff3355'); return; }
    const use = Math.min(state.boxes, count);
    state.boxes -= use; state.activeBoxGroups += use;
    addLog(`📦 ${use} Box açıldı — ${state.activeBoxGroups} grup kuyruğunda`, '#00f5ff');
    if(enemies.length === 0) spawnGroupForCurrentBox();
    renderPanels(); save();
  }

  // projectile handling & collisions
  function updateProjectiles(dt){
    for(let i=pProjs.length-1;i>=0;i--){
      const p = pProjs[i]; p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
      for(let j=0;j<enemies.length;j++){
        const e = enemies[j]; if(e.dead) continue;
        const dx = p.x - e.x, dy = p.y - e.y;
        if(Math.hypot(dx,dy) < 18){
          e.hp -= p.dmg; spawnFloatingText(e.x, e.y-10, p.dmg, '#fff'); pProjs.splice(i,1);
          if(e.hp <= 0 && !e.dead){ e.dead = true; addLog(`💀 ${e.name} yok edildi! +${e.xp||0}XP +${e.gold||0}G`, e.col); state.gold += e.gold||0; }
          break;
        }
      }
      if(p && (p.life <= 0 || p.x < -50 || p.x > W+50)) pProjs.splice(i,1);
    }
    for(let i=projs.length-1;i>=0;i--){
      const p = projs[i]; p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
      if(Math.hypot(p.x - 130, p.y - H*0.5) < 20){ spawnFloatingText(130,H*0.5, Math.max(1,p.dmg - 1),'#f55'); projs.splice(i,1); }
      if(p && (p.life <= 0 || p.x < -50 || p.x > W+50)) projs.splice(i,1);
    }
  }

  function spawnFloatingText(x,y,txt,col='#fff'){ particles.push({x,y,txt:txt.toString(),col,life:1.2}); }

  // main update per frame
  let aaTimer = 0;
  function update(dt){
    shipPulse += dt*3.5;
    // auto-open
    if(state.autoOpen && state.boxes > 0 && !state.lootPaused && !state.activeSpecialBoss){ if(Math.random() < dt*0.6) openBox(1); }
    // auto-sell bag
    if(state.autoSellBag && Math.random() < dt*0.05){ let worstIdx=-1, worstVal=1e9; for(let i=0;i<state.bag.length;i++){ const it=state.bag[i]; if(it && it.sv < worstVal){ worstVal=it.sv; worstIdx=i; } } if(worstIdx!==-1){ state.gold += state.bag[worstIdx].sellVal; addLog(`♻️ Otomatik satıldı: ${state.bag[worstIdx].name} +${state.bag[worstIdx].sellVal}G`,'#ffd700'); state.bag[worstIdx]=null; save(); renderPanels(); } }
    // auto-attack only if enemies present and not paused and not in boss modal
    if(!state.lootPaused && !state.activeSpecialBoss && enemies.length>0){
      aaTimer -= dt; const atkSPD = 0.9 + state.stats.agi*0.04;
      if(aaTimer <= 0){ aaTimer = 1 / atkSPD; const tgt = enemies.filter(e=>!e.dead).sort((a,b)=>a.x-b.x)[0]; if(tgt){ const dx=tgt.x-130, dy=tgt.y - H*0.5; const dist = Math.hypot(dx,dy)||1; pProjs.push({x:130+22,y:H*0.5,vx:(dx/dist)*420,vy:(dy/dist)*420,dmg:Math.ceil(10 + state.charLvl*1.6),life:1.6}); } }
    }
    // projectiles
    updateProjectiles(dt);
    // enemies movement & shooting
    for(let e of enemies){
      if(e.dead) continue;
      if(e.x > e.stopX) e.x -= (e.spd||50)*dt;
      else { if(!state.lootPaused && Math.random() < dt*0.6){ const dx=130-e.x, dy=H*0.5-e.y, dist=Math.hypot(dx,dy)||1; projs.push({x:e.x-10,y:e.y,vx:(dx/dist)*260,vy:(dy/dist)*260,dmg:Math.ceil(e.dmg),life:1.6}); } }
    }
    // particles
    for(let i=particles.length-1;i>=0;i--){ particles[i].life -= dt; particles[i].y -= dt*12; if(particles[i].life <= 0) particles.splice(i,1); }
    // clear-check
    if(!state.lootPaused && enemies.length>0 && enemies.every(x=>x.dead)){
      enemies = [];
      if(state.activeBoxGroups > 0){
        const dropChance = 0.25 + Math.min(0.3, state.stats.lck * 0.01);
        if(Math.random() < dropChance){ const it = generateItem(); showLoot(it); } else { state.activeBoxGroups = Math.max(0, state.activeBoxGroups - 1); if(state.subwave < 10) state.subwave++; else { state.subwave = 1; state.wave++; } if(state.activeBoxGroups > 0) spawnGroupForCurrentBox(); }
      }
      renderUI();
    }
  }

  // render frame
  function render(){
    ctx.clearRect(0,0,W,H);
    const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#010516'); g.addColorStop(1,'#041028'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // stars
    for(let i=0;i<64;i++){ ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fillRect((i*47 + Math.sin(shipPulse + i)*6) % W, (i*37) % H, 2,2); }
    // ship
    drawShip(ctx,130,H*0.5,shipPulse,1);
    // enemies
    for(let e of enemies){
      if(!e.dead) drawEnemy(e);
      // hp bar
      const w = e.isBoss? 70:36; const h = 4;
      ctx.fillStyle = '#071028'; ctx.fillRect(e.x - w/2, e.y - (e.isBoss?60:28), w, h);
      const pct = Math.max(0, e.hp / (e.maxHp || 1));
      ctx.fillStyle = e.isBoss? '#ffd700' : e.col; ctx.fillRect(e.x - w/2, e.y - (e.isBoss?60:28), w*pct, h);
    }
    // projs & particles
    for(let p of pProjs){ ctx.fillStyle = '#00f5ff'; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); }
    for(let p of projs){ ctx.fillStyle = '#ff3344'; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); }
    ctx.textAlign = 'center';
    for(let pp of particles){ ctx.fillStyle = pp.col || '#fff'; ctx.globalAlpha = Math.max(0, pp.life); ctx.fillText(pp.txt, pp.x, pp.y); ctx.globalAlpha = 1; }
  }

  // main loop
  function loop(ts){
    if(!lastT) lastT = ts;
    const dt = Math.min((ts - lastT)/1000, 0.05);
    lastT = ts;
    update(dt); render(); renderUI();
    requestAnimationFrame(loop);
  }

  // UI helpers
  function addLog(msg, color='#cfe'){ const el = document.createElement('div'); el.className='clog-line'; el.textContent = msg; el.style.color = color; $('clog').appendChild(el); setTimeout(()=>{ try{ $('clog').removeChild(el);}catch(e){} },6000); }
  function renderPanels(){
    $('box-count').textContent = state.boxes;
    // equips
    const eq = $('equip-list'); eq.innerHTML = '';
    Object.keys(SLOTS).forEach(k=>{ const s = SLOTS[k]; const it = state.equipped[k]; const row = document.createElement('div'); row.className='equip-slot'; const left = document.createElement('div'); left.innerHTML = `<div style="font-size:14px">${s.icon} ${s.label}</div><div style="color:var(--dim);font-size:12px">${it?it.name:'Boş'}</div>`; const btn = document.createElement('button'); btn.className='btn'; btn.textContent = it? 'Çıkart':'—'; btn.addEventListener('click', ()=>{ if(it) unequip(k); }); row.appendChild(left); row.appendChild(btn); eq.appendChild(row); });
    // inv
    const grid = $('inv-grid'); grid.innerHTML = '';
    for(let i=0;i<20;i++){ const slot = document.createElement('div'); slot.className='inv-slot'; const it = state.bag[i]; if(!it){ slot.classList.add('empty'); slot.textContent = ''; } else { slot.textContent = it.icon; slot.title = it.name + ' +' + it.sv; slot.addEventListener('click', ()=> equipFromBag(i)); } grid.appendChild(slot); }
  }

  function renderUI(){
    $('wb-wave').textContent = state.wave; $('wb-sub').textContent = state.subwave;
    $('h-gold').textContent = fmt(state.gold); $('h-gqt').textContent = fmt(state.gqt); $('h-lvl').textContent = state.charLvl;
    // boss hp bar if activeSpecialBoss present
    if(state.activeSpecialBoss){ $('boss-hp-bar').style.width = Math.max(0, Math.round(state.activeSpecialBoss.hp / state.activeSpecialBoss.maxHp * 100)) + '%'; }
    renderPanels();
  }

  // equip/from bag
  function equipFromBag(i){
    const it = state.bag[i]; if(!it) return;
    const old = state.equipped[it.slotKey]; if(old){ const idx = state.bag.findIndex(x=>x===null); if(idx===-1){ addLog('Çanta dolu!','#ff3355'); return; } state.bag[idx] = old; }
    state.equipped[it.slotKey] = it; state.bag[i] = null; addLog(`✅ ${it.name} kuşanıldı`,'#cfe'); renderPanels(); save();
  }
  function unequip(slotKey){ const it = state.equipped[slotKey]; if(!it) return; const idx = state.bag.findIndex(x=>x===null); if(idx===-1){ addLog('Çanta dolu!','#ff3355'); return; } state.bag[idx] = it; state.equipped[slotKey] = null; addLog(`🔓 ${it.name} çıkarıldı`,'#cfe'); renderPanels(); save(); }

  // Special challenge bosses
  const CH_BOSSES = [
    {id:0,name:'PRIME ANOMALI', req:1, hp:5000, dmg:50, reward:{gold:500,gqt:0,boxes:5}},
    {id:1,name:'VOID EMPEROR', req:5, hp:80000, dmg:800, reward:{gold:3000,gqt:10,boxes:10}}
  ];
  function startSpecialBoss(id){
    const b = CH_BOSSES.find(x=>x.id===id); if(!b) return; if(state.charLvl < b.req){ addLog(`Gerekli seviye ${b.req}`,'#ff3355'); return; }
    state.activeSpecialBoss = { ...b, hp:b.hp, maxHp:b.hp }; $('boss-title').textContent = b.name; $('boss-hp-bar').style.width = '100%'; $('boss-log').innerHTML = ''; $('boss-modal').style.display = 'flex';
    addLog(`⚠️ ÖZEL BOSS: ${b.name} ile karşılaşma başladı`, '#ffd700');
  }
  function endSpecialBoss(won){
    if(won){ addLog('🏆 ÖZEL BOSS yenildi!', '#ffd700'); state.gold += state.activeSpecialBoss.reward.gold; state.gqt += state.activeSpecialBoss.reward.gqt; state.boxes += state.activeSpecialBoss.reward.boxes; }
    else addLog('❌ Boss karşılaşması sona erdi (yenilgi/geri çekilme).', '#ff3355');
    state.activeSpecialBoss = null; $('boss-modal').style.display = 'none'; save(); renderPanels();
  }
  $('boss-attack').addEventListener('click', ()=>{
    if(!state.activeSpecialBoss) return;
    const dmg = Math.ceil(15 + state.charLvl*1.6);
    state.activeSpecialBoss.hp -= dmg; $('boss-log').innerHTML += `<div style="color:#0ff">▶ Sen: ${dmg} hasar</div>`;
    if(state.activeSpecialBoss.hp <= 0){ $('boss-log').innerHTML += `<div style="color:#ffd700">🏆 Boss öldürüldü!</div>`; endSpecialBoss(true); return; }
    const bdmg = Math.ceil(state.activeSpecialBoss.dmg * (0.8 + Math.random()*0.5));
    $('boss-log').innerHTML += `<div style="color:#f55">◀ Boss: ${bdmg} hasar</div>`;
    $('boss-hp-bar').style.width = Math.max(0, Math.round(state.activeSpecialBoss.hp / state.activeSpecialBoss.maxHp * 100)) + '%';
  });
  $('boss-retreat').addEventListener('click', ()=> endSpecialBoss(false));

  // Input bindings
  $('open-1').addEventListener('click', ()=> openBox(1));
  $('open-10').addEventListener('click', ()=> openBox(10));
  $('open-1-side').addEventListener('click', ()=> openBox(1));
  $('open-10-side').addEventListener('click', ()=> openBox(10));
  $('lp-eq').addEventListener('click', equipLoot);
  $('lp-bag').addEventListener('click', bagLoot);
  $('lp-sell').addEventListener('click', sellLoot);

  $('auto-open').addEventListener('change', e=>{ state.autoOpen = e.target.checked; save(); });
  $('auto-equip').addEventListener('change', e=>{ state.autoEquip = e.target.checked; save(); });
  $('auto-sell').addEventListener('change', e=>{ state.autoSell = e.target.checked; save(); });

  // helpers
  function resizeIfNeeded(){ resizeCanvas(); }
  function addLog(msg,color='#cfe'){ const el = document.createElement('div'); el.className='clog-line'; el.textContent = msg; el.style.color = color; $('clog').appendChild(el); setTimeout(()=>{ try{ $('clog').removeChild(el);}catch(e){} },6000); }

  // initial spawn & panels
  function renderPanels(){ $('box-count').textContent = state.boxes; const eq = $('equip-list'); eq.innerHTML = ''; Object.keys(SLOTS).forEach(k=>{ const s=SLOTS[k], it=state.equipped[k]; const row=document.createElement('div'); row.className='equip-slot'; const left=document.createElement('div'); left.innerHTML = `<div style="font-size:14px">${s.icon} ${s.label}</div><div style="color:var(--dim);font-size:12px">${it?it.name:'Boş'}</div>`; const btn=document.createElement('button'); btn.className='btn'; btn.textContent=it? 'Çıkart':'—'; btn.addEventListener('click', ()=>{ if(it) unequip(k); }); row.appendChild(left); row.appendChild(btn); eq.appendChild(row); }); const grid=$('inv-grid'); grid.innerHTML=''; for(let i=0;i<20;i++){ const slot = document.createElement('div'); slot.className='inv-slot'; const it = state.bag[i]; if(!it){ slot.classList.add('empty'); slot.textContent=''; } else { slot.textContent = it.icon; slot.title = it.name + ' +' + it.sv; slot.addEventListener('click', ()=> equipFromBag(i)); } grid.appendChild(slot); } }
  renderPanels();

  // start a first group if boxes exist
  if(state.boxes > 0) spawnGroupForCurrentBox();

  // Start animation loop
  requestAnimationFrame(function start(ts){ lastT = ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
